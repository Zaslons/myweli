name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: mobile

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.6
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Zero-issue gate: infos and warnings are fatal, matching the
      # "analyze = 0" rule in the dev guardrails. Expected to be red until
      # the existing analyzer issues are cleared, then it stays the gate.
      - name: Analyze (zero issues required)
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Run tests
        run: flutter test
