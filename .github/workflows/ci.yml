name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: mobile

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.6
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      # Zero-issue gate: infos and warnings are fatal, matching the
      # "analyze = 0" rule in the dev guardrails.
      - name: Analyze (zero issues required)
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Run tests (with coverage)
        run: flutter test --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: mobile/coverage/lcov.info
          if-no-files-found: warn

  backend:
    name: Backend — Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.10.7

      - name: Install dependencies
        run: dart pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      # Zero-issue gate, matching the mobile job and the dev guardrails.
      - name: Analyze (zero issues required)
        run: dart analyze --fatal-infos --fatal-warnings

      - name: Run tests
        run: dart test

  security:
    name: Security — secrets & dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Fail the build if any credential is committed anywhere in the repo.
      - name: Secret scan (gitleaks)
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.18.4 \
            detect --source=/repo --no-git --redact --verbose

      # Known-vulnerability scan of the backend deps (blocking).
      - name: Dependency vulnerabilities — backend
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" \
            ghcr.io/google/osv-scanner:v1.8.5 \
            --lockfile=/src/backend/pubspec.lock

      # The large Flutter dep tree is surfaced but not yet blocking, pending a
      # first triage; promote to blocking once clean (docs/BACKEND.md §6).
      - name: Dependency vulnerabilities — mobile (report-only)
        continue-on-error: true
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" \
            ghcr.io/google/osv-scanner:v1.8.5 \
            --lockfile=/src/mobile/pubspec.lock
