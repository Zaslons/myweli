name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Every job runs on UTC clocks — the salon timezone is UTC+0 and date-boundary
# seeds must be deterministic (docs/design/timezone-salon-time.md §4).
env:
  TZ: UTC

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: mobile

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.6
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      # Zero-issue gate: infos and warnings are fatal, matching the
      # "analyze = 0" rule in the dev guardrails.
      - name: Analyze (zero issues required)
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Run tests (with coverage)
        run: flutter test --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: mobile/coverage/lcov.info
          if-no-files-found: warn

  backend:
    name: Backend — Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # Postgres service so the DB-backed repository tests (B3c) run against a real
    # database; without DATABASE_URL those tests skip (e.g. local dev).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: myweli_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.10.7

      - name: Install dependencies
        run: dart pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      # Zero-issue gate, matching the mobile job and the dev guardrails.
      - name: Analyze (zero issues required)
        run: dart analyze --fatal-infos --fatal-warnings

      - name: Run tests
        run: dart test
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/myweli_test

  backend-boot-smoke:
    name: Backend — boot smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # Validates the *production build path* the unit tests never exercise: the
    # custom entrypoint (main.dart) runs `initializeDatabase()` → real
    # migrations + provider seed against Postgres, then the server actually
    # serves. Catches route-tree code-gen breaks and startup/migration faults
    # before they reach a deploy.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: myweli_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/myweli_smoke
      JWT_SECRET: ci-boot-smoke-secret
      ENV: dev
      PORT: "8080"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.10.7

      - name: Install dependencies
        run: dart pub get

      - name: Activate dart_frog CLI
        run: dart pub global activate dart_frog_cli 1.2.14

      # Code-gens build/bin/server.dart from the whole route tree — fails the
      # job if any route file is misplaced or won't compile.
      - name: Build production server
        run: dart pub global run dart_frog_cli:dart_frog build

      - name: Boot server + smoke endpoints (real Postgres migrations)
        run: |
          set -euo pipefail
          dart build/bin/server.dart >/tmp/server.log 2>&1 &
          SERVER_PID=$!
          cleanup() {
            kill "$SERVER_PID" 2>/dev/null || true
            echo '--- server log ---'; cat /tmp/server.log || true
          }
          trap cleanup EXIT
          # Wait for the server to answer /health (fail fast if it dies).
          for i in $(seq 1 30); do
            curl -fsS "http://localhost:${PORT}/health" >/dev/null 2>&1 \
              && { echo "server up after ${i}s"; break; }
            kill -0 "$SERVER_PID" 2>/dev/null || { echo 'server died during boot'; exit 1; }
            sleep 1
          done
          # /health → ok
          curl -fsS "http://localhost:${PORT}/health" | tee /tmp/health.json; echo
          grep -q '"status":"ok"' /tmp/health.json
          # /providers → seeded data (proves migrations + seed ran on Postgres)
          curl -fsS "http://localhost:${PORT}/providers" | tee /tmp/providers.json; echo
          grep -q '"id":"provider1"' /tmp/providers.json
          # /localities → the seeded reference tree (multi-pays MP1)
          curl -fsS "http://localhost:${PORT}/localities" | tee /tmp/localities.json; echo
          grep -q '"code":"CI"' /tmp/localities.json
          grep -q '"id":"cocody"' /tmp/localities.json
          # Auth round-trip: request OTP → devCode → verify → tokens
          REQ=$(curl -fsS -X POST "http://localhost:${PORT}/auth/otp/request" \
            -H 'content-type: application/json' \
            -d '{"phoneNumber":"+2250700000009"}')
          echo "otp/request: $REQ"
          CODE=$(printf '%s' "$REQ" | sed -n 's/.*"devCode":"\([0-9]*\)".*/\1/p')
          test -n "$CODE"
          VER=$(curl -fsS -X POST "http://localhost:${PORT}/auth/otp/verify" \
            -H 'content-type: application/json' \
            -d "{\"phoneNumber\":\"+2250700000009\",\"code\":\"${CODE}\"}")
          printf '%s' "$VER" | head -c 200; echo
          printf '%s' "$VER" | grep -q '"accessToken"'
          echo 'boot smoke passed ✅'

  web:
    name: Web — Lint, Typecheck & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Fail if the committed API types drift from the OpenAPI contract.
      - name: API types match the contract
        run: |
          npm run gen:api
          git diff --exit-code lib/api/schema.ts

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  web-e2e:
    name: Web — e2e (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # Builds + serves the app against a stub API (hermetic) and runs the e2e.
      - name: Run e2e
        run: npm run e2e

  web-lighthouse:
    name: Web — Lighthouse (report-only)
    runs-on: ubuntu-latest
    # Surfaced but not yet blocking (CWV/SEO budgets in lighthouserc.json);
    # promote to blocking once stable.
    continue-on-error: true
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lighthouse budgets (home)
        run: npm run lhci

  security:
    name: Security — secrets & dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Fail the build if any credential is committed anywhere in the repo.
      - name: Secret scan (gitleaks)
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.18.4 \
            detect --source=/repo --no-git --redact --verbose

      # Known-vulnerability scan of the backend deps (blocking).
      - name: Dependency vulnerabilities — backend
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" \
            ghcr.io/google/osv-scanner:v1.8.5 \
            --lockfile=/src/backend/pubspec.lock

      # The large Flutter dep tree is surfaced but not yet blocking, pending a
      # first triage; promote to blocking once clean (docs/BACKEND.md §6).
      - name: Dependency vulnerabilities — mobile (report-only)
        continue-on-error: true
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" \
            ghcr.io/google/osv-scanner:v1.8.5 \
            --lockfile=/src/mobile/pubspec.lock

      # The npm tree is surfaced but not yet blocking, like mobile.
      - name: Dependency vulnerabilities — web (report-only)
        continue-on-error: true
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" \
            ghcr.io/google/osv-scanner:v1.8.5 \
            --lockfile=/src/web/package-lock.json
