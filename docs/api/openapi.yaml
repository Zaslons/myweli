  # ---- Admin disputes — B-admin Slice 2 / A4 --------------------------------
  # Admin-recorded case on a booking; no money moves (no-custody) — the outcome
  # is advisory + any consequence applied via suspend/ban.
  /admin/disputes:
    get:
      tags: [admin]
      summary: List dispute cases (B-admin, FR-WEB-AD-003)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: status, schema: { type: string, enum: [open, resolved] } }
        - { in: query, name: page, schema: { type: integer, minimum: 1 } }
        - { in: query, name: pageSize, schema: { type: integer, minimum: 1, maximum: 100 } }
      responses:
        '200':
          description: Paginated disputes
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { type: object } }
                  page: { type: integer }
                  pageSize: { type: integer }
                  total: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [admin]
      summary: Open a dispute on a booking (B-admin) — audited
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [appointmentId, reason]
              properties:
                appointmentId: { type: string }
                reason: { type: string }
      responses:
        '200': { description: The opened dispute }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/disputes/{id}:
    get:
      tags: [admin]
      summary: Dispute detail + evidence (B-admin)
      description: The dispute + its booking + a signed deposit-screenshot URL.
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200':
          description: dispute + appointment + depositScreenshotUrl
          content:
            application/json:
              schema: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/disputes/{id}/resolve:
    post:
      tags: [admin]
      summary: Resolve a dispute with an outcome (B-admin) — audited
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resolution]
              properties:
                resolution: { type: string }
      responses:
        '200': { description: The resolved dispute }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---- Admin analytics — B-admin Slice 3 / A5 (read-only) -------------------
  /admin/analytics/overview:
    get:
      tags: [admin]
      summary: Marketplace-health KPI snapshot (B-admin, FR-WEB-AD-006)
      description: >
        Read-only DB-derived KPIs: users (active/banned), providers
        (active/suspended), provider verification (pending/verified/rejected),
        bookings by status, no-show + cancellation rates, open/total disputes,
        reported-reviews count. Event-based funnels (search→book) are deferred
        (need a product-analytics stack).
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: KPI snapshot
          content:
            application/json:
              schema: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/analytics/north-star:
    get:
      tags: [admin]
      summary: North Star — completed bookings/week × commune (B-admin)
      description: >
        Completed bookings bucketed by ISO week (Monday start) and provider
        commune, over the last `weeks` (default 12, max 52). `series` is a flat
        list of `{week, commune, completed}`.
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: weeks, schema: { type: integer, minimum: 1, maximum: 52 } }
      responses:
        '200':
          description: weeks · fromWeek · totalCompleted · series[]
          content:
            application/json:
              schema:
                type: object
                properties:
                  weeks: { type: integer }
                  fromWeek: { type: string, format: date }
                  totalCompleted: { type: integer }
                  series:
                    type: array
                    items:
                      type: object
                      properties:
                        week: { type: string, format: date }
                        commune: { type: string }
                        completed: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Short-lived HS256 access token (~15 min). Obtain via /auth/otp/verify;
        refresh via /auth/refresh (rotating opaque refresh token). Applied to
        protected routes (e.g. /me) as those slices land — see docs/BACKEND.md §3.1.

  parameters:
    SalonSelector:
      name: salonId
      in: query
      required: false
      schema: { type: string }
      description: >-
        R6 multi-salons: select the acting salon among the caller's ACTIVE
        memberships. Absent → the caller's default salon (legacy behavior).
        Any invalid selection (never-member, revoked-there, unknown id) is a
        uniform 403 `forbidden` — no membership-existence oracle (threat
        T55) — and never auto-provisions.

  responses:
    BadRequest:
      description: Invalid input
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Authenticated but not allowed (e.g. another user's resource)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: Not allowed in the resource's current state
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    Health:
      type: object
      required: [status, service, time]
      properties:
        status: { type: string, example: ok }
        service: { type: string, example: myweli-api }
        time: { type: string, format: date-time }

    Error:
      type: object
      required: [error]
      properties:
        error: { type: string, description: Stable machine code, e.g. otp_expired }
        message: { type: string, description: Optional human-readable detail }

    OtpRequest:
      type: object
      required: [phoneNumber]
      properties:
        phoneNumber:
          type: string
          description: E.164, defaulting to +225 (Côte d'Ivoire).
          example: '+2250707123456'

    OtpVerify:
      type: object
      required: [phoneNumber, code]
      properties:
        phoneNumber: { type: string, example: '+2250707123456' }
        code: { type: string, example: '123456' }

    TokenPair:
      type: object
      required: [accessToken, refreshToken, expiresAt]
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresAt:
          type: string
          format: date-time
          description: Access-token expiry; mirrors the app's Session.expiresAt.

    AuthSession:
      type: object
      required: [tokens, user]
      properties:
        tokens: { $ref: '#/components/schemas/TokenPair' }
        user: { $ref: '#/components/schemas/User' }

    User:
      type: object
      required: [id]
      description: >
        Auth overhaul (docs/design/auth-social-email.md): identity = verified
        email (Google/Apple/email-OTP); phone is an optional contact attribute.
      properties:
        id: { type: string }
        phoneNumber: { type: string, nullable: true }
        phoneVerified: { type: boolean }
        name: { type: string, nullable: true }
        email: { type: string, nullable: true }
        authProvider:
          type: string
          nullable: true
          enum: [google, apple, email, phone]
        avatarUrl: { type: string, nullable: true }
        status: { type: string, enum: [active, banned] }
        createdAt: { type: string, format: date-time }

    Membership:
      type: object
      description: >
        The signed-in caller's membership in the acting salon (module
        `access` R4a): the preset role, its SERVER-computed capabilities
        (clients never derive rights), and the Collaborateur's artist link.
      required: [role, capabilities]
      properties:
        role: { type: string, enum: [owner, manager, reception, staff] }
        capabilities:
          type: array
          items: { type: string }
          description: Sorted capability names, e.g. journal.view.own.
        artistId: { type: string, nullable: true }
        artistName: { type: string, nullable: true }

    SalonMembership:
      type: object
      description: >
        One « Mes salons » entry (module `access` R6): a salon the caller
        holds an ACTIVE membership in, with their role there and enough
        salon surface for the switcher (name, status, badge, thumb).
      required: [salonId, salonName, role, salonStatus, verified]
      properties:
        salonId: { type: string }
        salonName: { type: string }
        role: { type: string, enum: [owner, manager, reception, staff] }
        salonStatus: { type: string, enum: [draft, active, suspended] }
        verified: { type: boolean }
        imageUrl: { type: string, nullable: true }

    TeamMember:
      type: object
      description: >
        A salon team row (module `access` R2b) — the owner, an active
        member, or a pending invitation.
      required: [id, providerId, email, role, status, invitedAt]
      properties:
        id: { type: string }
        providerId: { type: string }
        accountId: { type: string, nullable: true }
        email: { type: string }
        role: { type: string, enum: [owner, manager, reception, staff] }
        artistId: { type: string, nullable: true }
        artistName: { type: string, nullable: true }
        status: { type: string, enum: [active, invited, revoked] }
        invitedAt: { type: string, format: date-time }
        acceptedAt: { type: string, format: date-time, nullable: true }
        revokedAt: { type: string, format: date-time, nullable: true }
        expiresAt: { type: string, format: date-time, nullable: true }
        resendsLeft: { type: integer }
        expired:
          type: boolean
          description: True when an invited row is past its expiry.

    TeamInvitation:
      type: object
      description: >
        A pending-invitation card as shown to the INVITEE (module `access`
        R2b) — no salon internals beyond the name.
      required: [id, providerId, salonName, role, roleLabel, expiresAt]
      properties:
        id: { type: string }
        providerId: { type: string }
        salonName: { type: string }
        role: { type: string, enum: [manager, reception, staff] }
        roleLabel: { type: string, description: French label (Manager / Réception / Collaborateur). }
        expiresAt: { type: string, format: date-time }

    ProviderSession:
      type: object
      description: >
        Flat (historical) provider session — every provider login/registration
        endpoint returns this shape.
      required: [provider, accessToken, refreshToken, expiresAt]
      properties:
        provider: { $ref: '#/components/schemas/ProviderUser' }
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresAt: { type: string, format: date-time }

    ProviderUser:
      type: object
      description: >
        A provider (business) account. Mirrors ProviderUser.toJson(). Auth
        overhaul (docs/design/pro-auth-social.md): identity = verified email;
        phoneNumber is the REQUIRED salon contact.
      required: [id, phoneNumber, businessName, businessType, createdAt]
      properties:
        id: { type: string }
        phoneNumber: { type: string }
        name: { type: string, nullable: true }
        authProvider:
          type: string
          nullable: true
          enum: [google, apple, email, phone]
        businessName: { type: string }
        businessType:
          type: string
          enum: [salon, barber, spa, nailSalon, massage, other]
        email: { type: string, nullable: true }
        address: { type: string, nullable: true }
        verificationStatus:
          type: string
          enum: [pending, verified, rejected]
        rejectionReason: { type: string, nullable: true }
        kycDocs:
          type: array
          description: KYC document references (empty until the KYC slice).
          items: { type: object }
        createdAt: { type: string, format: date-time }
        providerId: { type: string, nullable: true }

    Appointment:
      type: object
      description: A booking. Mirrors Appointment.toJson(). Created `pending`.
      required:
        [id, userId, providerId, serviceIds, appointmentDate, status, totalPrice, createdAt]
      properties:
        id: { type: string }
        userId: { type: string }
        providerId: { type: string }
        serviceIds:
          type: array
          items: { type: string }
        artistId: { type: string, nullable: true }
        appointmentDate: { type: string, format: date-time }
        currency:
          type: string
          nullable: true
          description: >-
            Stamped from the salon at creation (multi-pays §4 — immutable);
            absent on pre-MP1 rows (read as the salon's).
        providerTimezone:
          type: string
          nullable: true
          description: >-
            Consumer-read enrichment (multi-pays MP1) — the salon's IANA
            timezone, for salon-time rendering.
        providerCurrency:
          type: string
          nullable: true
          description: Consumer-read enrichment — the salon's ISO-4217 currency.
        durationMinutes:
          type: integer
          description: >
            Server-computed total service duration; backs the booking
            overlap-exclusion constraint. Read-only.
        status:
          type: string
          enum: [pending, confirmed, cancelled, completed, noShow]
        totalPrice: { type: number }
        depositAmount: { type: number }
        balanceDue: { type: number }
        cancellationWindowHours: { type: integer }
        clientName: { type: string, nullable: true }
        clientPhone: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        depositScreenshotUrl: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        arrivedAt:
          type: string
          format: date-time
          nullable: true
          description: >
            « Client arrivé » (journal J2) — stamped by the salon on a
            confirmed booking on its calendar day. Read-only.
        salonClientId:
          type: string
          nullable: true
          description: >
            PROVIDER VIEW ONLY (module clients C1): the salon-client row this
            booking resolves to — links the pro detail to the client card.
        clientNoShowCount:
          type: integer
          nullable: true
          description: >
            PROVIDER VIEW ONLY: the client's no-show count at this salon
            (server-computed) — the accept-screen badge (neutral at 1, red
            from 2).

    JournalDay:
      type: object
      description: One payload renders the whole journal grid (journal J1).
      required: [date, artists, appointments]
      properties:
        date: { type: string, format: date }
        hours:
          type: object
          nullable: true
          description: Null when the salon is closed or the date is blocked.
          properties:
            open: { type: string, example: '09:00' }
            close: { type: string, example: '18:00' }
            breaks:
              type: array
              items:
                type: object
                properties:
                  start: { type: string }
                  end: { type: string }
        artists:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              name: { type: string }
              imageUrl: { type: string, nullable: true }
        appointments:
          type: array
          items: { $ref: '#/components/schemas/Appointment' }

    AppointmentList:
      type: object
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Appointment' }
        page: { type: integer }
        pageSize: { type: integer }
        total: { type: integer }

    SalonClient:
      type: object
      description: >
        A salon's client (module clients C1) — DERIVED from bookings (platform
        users + walk-in guests keyed by phone). `linked` = has a MyWeli
        account. Salon-scoped: never exposes cross-salon data (threat T45).
      required: [id, displayName, tags, linked, createdAt]
      properties:
        id: { type: string }
        displayName: { type: string }
        phone: { type: string, nullable: true }
        tags:
          type: array
          items: { type: string }
        lastVisitAt: { type: string, format: date-time, nullable: true }
        linked: { type: boolean }
        createdAt: { type: string, format: date-time }

    SalonClientListItem:
      allOf:
        - { $ref: '#/components/schemas/SalonClient' }
        - type: object
          required: [visits, noShows]
          properties:
            visits: { type: integer, description: Completed visits at this salon. }
            noShows: { type: integer }

    SalonClientList:
      type: object
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/SalonClientListItem' }
        page: { type: integer }
        pageSize: { type: integer }
        total: { type: integer }
        availableTags:
          type: array
          items: { type: string }
          description: Page 1 only — presets + the salon's custom tags.

    SalonClientStats:
      type: object
      required: [visits, spentFcfa, noShows, cancellations]
      properties:
        visits: { type: integer }
        spentFcfa: { type: number }
        noShows: { type: integer }
        cancellations: { type: integer }

    SalonClientNote:
      type: object
      description: Internal team note — NEVER consumer-visible (threat T47).
      required: [id, authorName, body, createdAt]
      properties:
        id: { type: string }
        authorName: { type: string }
        body: { type: string }
        createdAt: { type: string, format: date-time }

    SalonClientCard:
      allOf:
        - { $ref: '#/components/schemas/SalonClient' }
        - type: object
          required: [stats, notes]
          properties:
            stats: { $ref: '#/components/schemas/SalonClientStats' }
            upcoming:
              { $ref: '#/components/schemas/Appointment' }
            notes:
              type: array
              items: { $ref: '#/components/schemas/SalonClientNote' }

    DurationVariants:
      type: object
      description: Optional per-hair-length durations (minutes). Mirrors DurationVariants.
      properties:
        court: { type: integer }
        moyen: { type: integer }
        long: { type: integer }

    Service:
      type: object
      required: [id, name, description, price, durationMinutes, providerId, active]
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        price: { type: number, description: '"From" (minimum) price, FCFA.' }
        priceMax: { type: number, nullable: true, description: Optional upper bound. }
        durationMinutes: { type: integer }
        durationVariants: { $ref: '#/components/schemas/DurationVariants' }
        providerId: { type: string }
        artistIds:
          type: array
          items: { type: string }
        active:
          type: boolean
          description: >
            Bookable when true. A disabled service is hidden from booking and
            rejected server-side. Defaults to true on create.

    ServiceInput:
      type: object
      description: >
        Create/update payload. On create, name/price/durationMinutes are
        required; on PATCH every field is optional. `id`/`providerId` are
        server-set and ignored if sent.
      properties:
        name: { type: string }
        description: { type: string }
        price: { type: number }
        priceMax: { type: number, nullable: true }
        durationMinutes: { type: integer }
        durationVariants: { $ref: '#/components/schemas/DurationVariants' }
        artistIds:
          type: array
          items: { type: string }
        active: { type: boolean }

    Artist:
      type: object
      required: [id, name, providerId]
      properties:
        id: { type: string }
        name: { type: string }
        imageUrl: { type: string, nullable: true }
        providerId: { type: string }
        specialization: { type: string, nullable: true }
        rating: { type: number, nullable: true, description: From reviews (read-only). }
        reviewCount: { type: integer, nullable: true, description: Read-only. }
        workingHours:
          type: object
          description: '{ "<0..6>": [TimeSlot] } — per-staff weekly hours.'
          additionalProperties:
            type: array
            items: { $ref: '#/components/schemas/TimeSlot' }

    ArtistInput:
      type: object
      description: >
        Create/update payload. `name` required on create; PATCH optional.
        `id`/`providerId`/`rating`/`reviewCount` are server-owned and ignored.
      properties:
        name: { type: string }
        specialization: { type: string, nullable: true }
        imageUrl: { type: string, nullable: true }
        workingHours:
          type: object
          additionalProperties:
            type: array
            items: { $ref: '#/components/schemas/TimeSlot' }

    TimeSlot:
      type: object
      required: [startTime, endTime, isAvailable]
      properties:
        startTime:
          type: string
          format: date-time
          description: Only the time-of-day is significant (placeholder date).
        endTime: { type: string, format: date-time }
        isAvailable: { type: boolean }

    Availability:
      type: object
      required: [providerId, weeklySchedule, blockedDates, bufferMinutes]
      properties:
        providerId: { type: string }
        weeklySchedule:
          type: object
          description: 'Keys "0".."6" (Mon..Sun) → working windows.'
          additionalProperties:
            type: array
            items: { $ref: '#/components/schemas/TimeSlot' }
        breaks:
          type: object
          description: Same shape as weeklySchedule; within-day breaks.
          additionalProperties:
            type: array
            items: { $ref: '#/components/schemas/TimeSlot' }
        blockedDates:
          type: array
          items: { type: string, format: date-time }
        bufferMinutes:
          type: integer
          description: Setup/cleanup gap enforced around each booking.

    DashboardStats:
      type: object
      required:
        [todayAppointments, pendingRequests, todayRevenue, weekRevenue,
         monthRevenue, totalAppointments]
      properties:
        todayAppointments:
          type: integer
          description: Non-cancelled bookings today (UTC).
        pendingRequests: { type: integer, description: Bookings awaiting accept. }
        todayRevenue:
          type: number
          description: Σ totalPrice of confirmed+completed bookings today (FCFA).
        weekRevenue: { type: number, description: Same, Monday-based week. }
        monthRevenue: { type: number, description: Same, calendar month. }
        totalAppointments: { type: integer, description: All-time, any status. }

    UploadTicket:
      type: object
      required: [method, uploadUrl, fields, key, maxBytes, expiresInSeconds]
      properties:
        method: { type: string, enum: [POST] }
        uploadUrl: { type: string, description: Multipart POST target (storage). }
        fields:
          type: object
          additionalProperties: { type: string }
          description: Signed form fields; send these then the file (last).
        key: { type: string, description: The object key (used to reference the upload). }
        publicUrl:
          type: string
          description: CDN URL — only for `gallery` (omitted for private `kyc`).
        maxBytes: { type: integer }
        expiresInSeconds: { type: integer }

    KycStatus:
      type: object
      required: [status, documents]
      properties:
        status:
          type: string
          enum: [pending, verified, rejected]
          description: Server-owned; only the (future) admin flips it.
        documents:
          type: array
          items: { $ref: '#/components/schemas/KycDocument' }
        rejectionReason: { type: string, nullable: true }

    KycDocument:
      type: object
      required: [type, key]
      properties:
        type:
          type: string
          enum: [idCard, selfie, businessRegistration, addressProof]
        fileName: { type: string }
        key: { type: string, description: Private storage object key. }
        submittedAt: { type: string, format: date-time }

    KycDocumentInput:
      type: object
      required: [type, key]
      properties:
        type:
          type: string
          enum: [idCard, selfie, businessRegistration, addressProof]
        fileName: { type: string }
        key:
          type: string
          description: From `/uploads/sign?purpose=kyc`; under the caller's prefix.

    Review:
      type: object
      required: [id, providerId, userId, userName, rating, createdAt]
      properties:
        id: { type: string }
        appointmentId: { type: string, description: The reviewed visit. }
        providerId: { type: string }
        userId: { type: string }
        userName: { type: string }
        rating: { type: integer, minimum: 1, maximum: 5 }
        text: { type: string }
        verified: { type: boolean, description: Always true (post-completion). }
        artistId: { type: string, nullable: true }
        artistName: { type: string, nullable: true }
        serviceName: { type: string, description: Service(s) of the visit. }
        photoUrls: { type: array, items: { type: string } }
        createdAt: { type: string, format: date-time }

    DepositPolicy:
      type: object
      required: [depositRequired, depositPercentage, cancellationWindowHours]
      properties:
        depositRequired: { type: boolean }
        depositPercentage:
          type: number
          minimum: 0
          maximum: 1
          description: Fraction of the total (0.30 = 30%); > 0 when required.
        cancellationWindowHours: { type: integer, minimum: 0, maximum: 720 }
        mobileMoneyOperator:
          type: string
          nullable: true
          description: >-
            An operator id from the salon COUNTRY's catalog
            (GET /localities → country.operators — multi-pays MP1).
        mobileMoneyNumber:
          type: string
          nullable: true
          description: E.164. Required (with operator) when depositRequired.

    Gallery:
      type: object
      required: [imageUrls]
      properties:
        imageUrls:
          type: array
          maxItems: 20
          items: { type: string, maxLength: 2048 }
          description: Ordered list of hosted photo URLs (bytes live in storage).

    Notification:
      type: object
      description: In-app notification — mirrors the app's AppNotification.
      required: [id, type, title, body, createdAt, read]
      properties:
        id: { type: string }
        type:
          type: string
          enum: [bookingConfirmed, depositReceived, reminder, reschedule, cancellation, reviewRequest, general]
        title: { type: string }
        body: { type: string }
        createdAt: { type: string, format: date-time }
        read: { type: boolean }
        route: { type: string, nullable: true, description: Optional in-app deep link (e.g. /bookings). }

    NotificationPreferences:
      type: object
      description: >
        Per-user notification opt-out prefs (FR-NOTIF-004). All default true;
        respected at send time by BookingNotifier. Transactional confirmations
        are not configurable (always sent).
      required: [reminders, marketing, push]
      properties:
        reminders: { type: boolean, description: 24h/2h appointment reminders. }
        marketing: { type: boolean, description: Marketing/promotional messages (ARTCI opt-out). }
        push: { type: boolean, description: Device push notifications. }

    SalonSubscription:
      type: object
      description: >
        The salon's offer state (pricing pivot — R2a). Billing state lives in
        its own table and NEVER enters public provider payloads (T54).
      required: [tier, status, trialEndsAt, graceEndsAt, seats]
      properties:
        tier: { type: string, enum: [pro, business, reseau] }
        status: { type: string, enum: [trial, paid, grace, expired] }
        trialEndsAt: { type: string, format: date-time }
        paidUntil: { type: string, format: date-time, nullable: true }
        graceEndsAt: { type: string, format: date-time }
        unpublishedForBilling: { type: boolean }
        seats:
          type: object
          required: [cap, used]
          properties:
            cap: { type: integer, description: Places for the tier (owner + team, invited included). }
            used: { type: integer }

    Subscription:
      type: object
      description: >
        Provider plan & trial status (FR-PRO-SUB-001), derived from signup. V1
        has no billing state; paid tiers/auto-renew land post-incorporation.
      required: [tier, status, trialEndsAt, trialDaysLeft]
      properties:
        tier: { type: string, enum: [free, pro] }
        status: { type: string, enum: [trial, free] }
        trialEndsAt: { type: string, format: date-time }
        trialDaysLeft: { type: integer, description: Days left in the free trial (0 once ended). }

    BeforeAfterPair:
      type: object
      required: [before, after]
      properties:
        before: { type: string, maxLength: 2048, description: Hosted "before" photo URL. }
        after: { type: string, maxLength: 2048, description: Hosted "after" photo URL. }
        caption: { type: string, maxLength: 120, nullable: true }

    BeforeAfterList:
      type: object
      required: [beforeAfters]
      properties:
        beforeAfters:
          type: array
          maxItems: 12
          items: { $ref: '#/components/schemas/BeforeAfterPair' }
          description: Curated before/after pairs (FR-DISC-006).

    EarningsData:
      type: object
      required: [totalEarnings, transactions]
      properties:
        totalEarnings:
          type: number
          description: Σ totalPrice of completed bookings in range.
        currency:
          type: string
          description: >-
            The salon's ISO-4217 currency (multi-pays MP1); XOF/XAF display
            as « FCFA ».
        transactions:
          type: array
          items: { $ref: '#/components/schemas/EarningsTransaction' }

    EarningsTransaction:
      type: object
      required: [id, appointmentId, amount, date, status]
      properties:
        id: { type: string }
        appointmentId: { type: string }
        amount: { type: number }
        currency:
          type: string
          nullable: true
          description: The stamped record currency (multi-pays §4).
        date: { type: string, format: date-time }
        status: { type: string, description: '"completed".' }

    ProviderSummary:
      type: object
      description: Lightweight list item for /providers.
      required: [id, name, category, rating, reviewCount]
      properties:
        id: { type: string }
        name: { type: string }
        category: { type: string }
        commune: { type: string, nullable: true }
        rating: { type: number }
        reviewCount: { type: integer }
        logoUrl: { type: string, nullable: true }
        imageUrls:
          type: array
          items: { type: string }
        depositRequired: { type: boolean }

    LocalityTree:
      type: object
      required: [countries]
      properties:
        countries:
          type: array
          items: { $ref: '#/components/schemas/LocalityCountry' }

    LocalityCountry:
      type: object
      required: [code, name, currency, phonePrefix, operators, cities]
      properties:
        code: { type: string, description: ISO-3166 alpha-2 (e.g. CI). }
        name: { type: string }
        currency: { type: string, description: ISO-4217 (e.g. XOF). }
        phonePrefix: { type: string, description: E.164 prefix (e.g. +225). }
        operators:
          type: array
          items: { $ref: '#/components/schemas/MomoOperator' }
        cities:
          type: array
          items: { $ref: '#/components/schemas/LocalityCity' }

    LocalityCity:
      type: object
      required: [id, slug, name, timezone, areas]
      properties:
        id: { type: string }
        slug: { type: string }
        name: { type: string }
        timezone: { type: string, description: IANA — drives every salon in the city. }
        lat: { type: number, nullable: true }
        lng: { type: number, nullable: true }
        areas:
          type: array
          items: { $ref: '#/components/schemas/LocalityArea' }

    LocalityArea:
      type: object
      required: [id, slug, name, labelKind]
      properties:
        id: { type: string }
        slug: { type: string }
        name: { type: string }
        labelKind:
          type: string
          enum: [commune, quartier, arrondissement]
        lat: { type: number, nullable: true }
        lng: { type: number, nullable: true }

    MomoOperator:
      type: object
      required: [id, label]
      properties:
        id: { type: string, description: The wire value used by deposit policies. }
        label: { type: string }
        deepLinkKind:
          type: string
          nullable: true
          description: >-
            Closed vocabulary driving client payment deep links (`wave`
            today) — clients never build links from payload URLs (T56).

    Provider:
      type: object
      description: Full provider detail. Mirrors Provider.toJson() field-for-field.
      required: [id, name, description, address, imageUrls, rating, reviewCount, services, phoneNumber, category]
      properties:
        id: { type: string }
        slug: { type: string, description: URL slug for the public web page (myweli.ci/<slug>). }
        status:
          type: string
          enum: [draft, active, suspended]
          description: >
            Server-owned lifecycle (pro-salon-lifecycle): `draft` until the
            owner publishes; public reads only ever return `active`.
        verified:
          type: boolean
          description: >
            Server-owned « Vérifié » badge — denormalized from the account's
            KYC status on admin approve/reject (T52; consumer trust signal).
        name: { type: string }
        description: { type: string }
        address: { type: string }
        city: { type: string, nullable: true }
        commune: { type: string, nullable: true }
        areaId:
          type: string
          nullable: true
          description: >-
            The salon's locality (an `Area.id` from GET /localities). Market
            facts below DERIVE from it server-side (multi-pays MP1, T57).
        citySlug: { type: string, nullable: true }
        countryCode: { type: string, nullable: true, description: ISO-3166 alpha-2. }
        timezone:
          type: string
          nullable: true
          description: >-
            IANA — derived from the salon's city; every displayed time and
            day boundary uses it (salon time). Never client-writable.
        currency:
          type: string
          nullable: true
          description: >-
            ISO-4217 — derived from the salon's country at creation, immutable
            self-serve; XOF/XAF display as « FCFA ».
        latitude: { type: number, nullable: true }
        longitude: { type: number, nullable: true }
        imageUrls:
          type: array
          items: { type: string }
        beforeAfters:
          type: array
          items: { $ref: '#/components/schemas/BeforeAfterPair' }
          description: Curated before/after pairs (FR-DISC-006); may be absent/empty.
        logoUrl: { type: string, nullable: true }
        rating: { type: number }
        reviewCount: { type: integer }
        services:
          type: array
          items: { $ref: '#/components/schemas/Service' }
        phoneNumber: { type: string }
        whatsapp: { type: string, nullable: true }
        category: { type: string }
        depositRequired: { type: boolean }
        depositPercentage: { type: number }
        depositMobileMoneyOperator:
          type: string
          nullable: true
          description: >-
            An operator id from the salon COUNTRY's catalog
            (GET /localities → country.operators — multi-pays MP1).
        depositMobileMoneyNumber: { type: string, nullable: true }
        cancellationWindowHours: { type: integer }
        artists:
          type: array
          items: { $ref: '#/components/schemas/Artist' }
          description: Staff/artists; may be absent/empty.
        availability: { $ref: '#/components/schemas/Availability' }
        reviews:
          type: array
          items: { $ref: '#/components/schemas/Review' }
          description: Recent reviews embedded by the detail/by-slug reads (preview).
