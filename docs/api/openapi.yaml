openapi: 3.1.0

info:
  title: Myweli API
  version: 0.1.0
  description: >
    The single REST API behind every Myweli client (Flutter mobile app, the
    public Next.js web, the admin console). It replaces the app's mock
    `*ServiceInterface` implementations one slice at a time (ROADMAP Phase 3).


    This file is the **contract source of truth**. Schemas mirror the Dart DTOs
    in `mobile/lib/models/` exactly, so swapping a mock for `Api<X>Service` is a
    field-for-field match. Endpoints are added as each slice ships:
      - B0  health                      (implemented)
      - B1  GET /providers, /providers/{id}   (contract locked; impl next)
      - B2  POST /auth/otp/*, /auth/refresh   (contract locked; impl next)
    Real Mobile Money, WhatsApp/SMS and FCM are out of V1 scope here.

servers:
  - url: http://localhost:8080
    description: Local dart_frog dev server

tags:
  - name: system
  - name: auth
  - name: providers

paths:
  /health:
    get:
      tags: [system]
      summary: Liveness probe
      responses:
        '200':
          description: Service is up
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }

  /auth/otp/request:
    post:
      tags: [auth]
      summary: Request a one-time code for a phone number (B2)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OtpRequest' }
      responses:
        '202':
          description: Code dispatched (dev builds return it inline)
          content:
            application/json:
              schema:
                type: object
                properties:
                  expiresInSeconds: { type: integer, example: 300 }
                  devCode:
                    type: string
                    description: Present only in dev; never in production.
        '429': { $ref: '#/components/responses/RateLimited' }

  /auth/otp/verify:
    post:
      tags: [auth]
      summary: Verify a code and issue tokens (B2)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OtpVerify' }
      responses:
        '200':
          description: Verified
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthSession' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /auth/refresh:
    post:
      tags: [auth]
      summary: Exchange a refresh token for a new token pair (B2)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: Rotated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me:
    patch:
      tags: [auth]
      summary: Update the signed-in user's own profile (B2)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string, description: "Empty string clears it." }
                avatarUrl: { type: string }
      responses:
        '200':
          description: The updated user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [auth]
      summary: Delete the signed-in user's own account (B2)
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/kyc:
    get:
      tags: [kyc]
      summary: The signed-in provider's KYC status (B-kyc)
      description: Provider-only; self-scoped to the token's account.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: KYC status + submitted documents
          content:
            application/json:
              schema: { $ref: '#/components/schemas/KycStatus' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [kyc]
      summary: Submit KYC documents (B-kyc)
      description: >
        Provider-only. Each document's `key` is one the caller uploaded via
        `POST /uploads/sign?purpose=kyc` (must be under the caller's
        `kyc/{accountId}/` prefix). Sets `verificationStatus` to `pending` and
        clears any prior rejection. Approve/reject is a future admin slice.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [documents]
              properties:
                documents:
                  type: array
                  items: { $ref: '#/components/schemas/KycDocumentInput' }
      responses:
        '200':
          description: The updated KYC status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/KycStatus' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /me/favorites:
    get:
      tags: [favorites]
      summary: The signed-in consumer's saved provider ids (B-favorites)
      description: >
        Consumer-only; scoped to the token's `sub` (no user id is accepted, so
        a caller only ever sees their own favorites).
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: The user's favorite provider ids
          content:
            application/json:
              schema:
                type: object
                required: [providerIds]
                properties:
                  providerIds:
                    type: array
                    items: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /me/favorites/{providerId}:
    parameters:
      - { in: path, name: providerId, required: true, schema: { type: string } }
    post:
      tags: [favorites]
      summary: Save a provider as a favorite (idempotent)
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Added (or already a favorite) }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [favorites]
      summary: Remove a favorite (idempotent)
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Removed (or was not a favorite) }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /auth/provider/otp/request:
    post:
      tags: [auth]
      summary: Request a login code for an existing provider (B-prov)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OtpRequest' }
      responses:
        '202':
          description: Code dispatched (dev builds return it inline)
          content:
            application/json:
              schema:
                type: object
                properties:
                  expiresInSeconds: { type: integer }
                  devCode: { type: string, description: dev only }
        '429': { $ref: '#/components/responses/RateLimited' }

  /auth/provider/register:
    post:
      tags: [auth]
      summary: Register a provider account and dispatch a code (B-prov)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phoneNumber, businessName, businessType]
              properties:
                phoneNumber: { type: string, example: '+2250544556677' }
                businessName: { type: string }
                businessType:
                  type: string
                  enum: [salon, barber, spa, nailSalon, massage, other]
                address: { type: string }
                providerId:
                  type: string
                  description: >
                    Links the account to the Provider listing it manages
                    (required to act on that salon's appointments).
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider: { $ref: '#/components/schemas/ProviderUser' }
                  expiresInSeconds: { type: integer }
                  devCode: { type: string, description: dev only }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409':
          description: A provider already exists for this phone
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/provider/otp/verify:
    post:
      tags: [auth]
      summary: Verify a provider code; returns the account + a token pair (B-prov)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OtpVerify' }
      responses:
        '200':
          description: Verified
          content:
            application/json:
              schema:
                type: object
                required: [provider, accessToken, refreshToken, expiresAt]
                properties:
                  provider: { $ref: '#/components/schemas/ProviderUser' }
                  accessToken:
                    type: string
                    description: Signed JWT, role `provider`.
                  refreshToken:
                    type: string
                    description: >
                      Rotating opaque refresh token (hashed at rest); exchange
                      at POST /auth/provider/refresh.
                  expiresAt:
                    type: string
                    format: date-time
                    description: Access-token expiry.
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /auth/provider/refresh:
    post:
      tags: [auth]
      summary: Exchange a provider refresh token for a new token pair (B-prov)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: Rotated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /providers:
    get:
      tags: [providers]
      summary: List/search providers (B1)
      parameters:
        - { in: query, name: q, schema: { type: string }, description: Free-text search }
        - { in: query, name: commune, schema: { type: string } }
        - { in: query, name: category, schema: { type: string } }
        - { in: query, name: page, schema: { type: integer, default: 1, minimum: 1 } }
        - { in: query, name: pageSize, schema: { type: integer, default: 20, minimum: 1, maximum: 50 } }
      responses:
        '200':
          description: A page of providers
          content:
            application/json:
              schema:
                type: object
                required: [items, page, pageSize, total]
                properties:
                  items:
                    type: array
                    description: >
                      Full Provider objects for now (the app model has no
                      separate summary type). ProviderSummary is reserved for a
                      later lightweight list payload.
                    items: { $ref: '#/components/schemas/Provider' }
                  page: { type: integer }
                  pageSize: { type: integer }
                  total: { type: integer }

  /providers/{id}:
    get:
      tags: [providers]
      summary: Provider detail (B1)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200':
          description: The provider
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Provider' }
        '404': { $ref: '#/components/responses/NotFound' }

  /providers/{id}/services:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    get:
      tags: [providers]
      summary: List a salon's services (B-cat, provider-owned)
      description: >
        Provider-authenticated and ownership-scoped: the token's account must
        manage `{id}` (else 403).
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: The salon's services
          content:
            application/json:
              schema:
                type: object
                required: [items, page, pageSize, total]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Service' }
                  page: { type: integer }
                  pageSize: { type: integer }
                  total: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [providers]
      summary: Create a service (B-cat)
      description: Server sets `id`, `providerId`, and `active` (default true).
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ServiceInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Service' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /providers/{id}/services/{serviceId}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
      - { in: path, name: serviceId, required: true, schema: { type: string } }
    patch:
      tags: [providers]
      summary: Update a service — incl. `active` to enable/disable (B-cat)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ServiceInput' }
      responses:
        '200':
          description: The updated service
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Service' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [providers]
      summary: Delete a service (B-cat)
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /providers/{id}/artists:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    get:
      tags: [providers]
      summary: List a salon's staff (B-artists, provider-owned)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: The salon's artists
          content:
            application/json:
              schema:
                type: object
                required: [items, page, pageSize, total]
                properties:
                  items: { type: array, items: { $ref: '#/components/schemas/Artist' } }
                  page: { type: integer }
                  pageSize: { type: integer }
                  total: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [providers]
      summary: Add a staff member (B-artists)
      description: >
        Server sets `id`/`providerId`; `rating`/`reviewCount` come from reviews
        (read-only). `workingHours` is `{ "<0..6>": [TimeSlot] }`.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ArtistInput' }
      responses:
        '201':
          description: The created artist
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Artist' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /providers/{id}/artists/{artistId}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
      - { in: path, name: artistId, required: true, schema: { type: string } }
    patch:
      tags: [providers]
      summary: Update a staff member (B-artists)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ArtistInput' }
      responses:
        '200':
          description: The updated artist
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Artist' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [providers]
      summary: Remove a staff member (B-artists)
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /providers/{id}/availability:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    get:
      tags: [providers]
      summary: Read a salon's availability (B-cat, provider-owned)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: The salon's availability
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Availability' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    put:
      tags: [providers]
      summary: Replace a salon's availability wholesale (B-cat)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Availability' }
      responses:
        '200':
          description: The stored availability
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Availability' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /providers/{id}/gallery:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    get:
      tags: [providers]
      summary: Read a salon's gallery photo URLs (B-gallery, provider-owned)
      description: >
        Provider-authenticated and ownership-scoped (→ 403). Image bytes are
        uploaded out of band to object storage; only URLs pass through the API.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: The salon's gallery
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Gallery' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    put:
      tags: [providers]
      summary: Replace a salon's gallery wholesale (B-gallery)
      description: >
        Validated: a list of non-empty URL strings, at most 20, each ≤ 2048
        chars. Server stores exactly what's sent.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Gallery' }
      responses:
        '200':
          description: The stored gallery
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Gallery' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /providers/{id}/reviews:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    get:
      tags: [reviews]
      summary: A salon's reviews, newest first (B-reviews, public)
      description: >
        Public, paginated. `pageSize` is clamped (default 20, max 50). The
        provider's `GET /providers/{id}` also embeds the latest 10.
      parameters:
        - { in: query, name: page, schema: { type: integer } }
        - { in: query, name: pageSize, schema: { type: integer } }
      responses:
        '200':
          description: A page of reviews
          content:
            application/json:
              schema:
                type: object
                required: [items, page, pageSize, total]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Review' }
                  page: { type: integer }
                  pageSize: { type: integer }
                  total: { type: integer }

  /providers/{id}/deposit-policy:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    get:
      tags: [providers]
      summary: Read a salon's deposit policy (B-deposit, provider-owned)
      description: Provider-authenticated and ownership-scoped (→ 403).
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: The salon's deposit policy
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DepositPolicy' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    put:
      tags: [providers]
      summary: Replace a salon's deposit policy wholesale (B-deposit)
      description: >
        Server-authoritative (booking derives each deposit from this).
        Validated: `depositPercentage` 0..1 (and > 0 when required);
        `cancellationWindowHours` 0..720; `mobileMoneyOperator` in the enum;
        `mobileMoneyNumber` E.164. **When `depositRequired` is true, the Mobile
        Money operator + number are required.**
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DepositPolicy' }
      responses:
        '200':
          description: The stored deposit policy
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DepositPolicy' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /providers/{id}/dashboard:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    get:
      tags: [providers]
      summary: Server-computed dashboard stats for a salon (B-dash)
      description: >
        Provider-authenticated and ownership-scoped (token account's
        `providerId` must equal `{id}` → else 403). Revenue counts
        `confirmed` + `completed`; `todayAppointments` excludes cancelled.
        Computed in UTC.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: The salon's dashboard stats
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DashboardStats' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /providers/{id}/earnings:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    get:
      tags: [providers]
      summary: The salon's realized earnings ledger (B-earn)
      description: >
        Provider-authenticated and ownership-scoped (→ 403). Counts only
        `completed` appointments (realized money — narrower than the
        dashboard's revenue). Optional inclusive UTC date range; absent = all
        time.
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: startDate, schema: { type: string, format: date-time } }
        - { in: query, name: endDate, schema: { type: string, format: date-time } }
      responses:
        '200':
          description: The salon's earnings
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EarningsData' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /providers/{id}/appointments:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    post:
      tags: [providers]
      summary: Salon-entered (walk-in / phone) booking (B-manual)
      description: >
        A booking the salon enters itself for a client with no app account —
        walk-in, after-the-fact, or a future phone booking. Provider-only and
        ownership-scoped. Server-priced; created `confirmed` with no online
        deposit (`userId` = `"manual"`). No slot-engine validation (the salon
        owns its calendar); the exact-start unique index still guards
        double-booking (409). `sendSmsInvite` is accepted but a no-op until the
        notifications slice.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [serviceIds, appointmentDateTime]
              properties:
                serviceIds:
                  type: array
                  items: { type: string }
                appointmentDateTime: { type: string, format: date-time }
                artistId: { type: string }
                clientName: { type: string }
                clientPhone: { type: string, description: E.164 if provided. }
                notes: { type: string }
                sendSmsInvite: { type: boolean }
      responses:
        '201':
          description: The created (confirmed) appointment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Appointment' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Exact-start slot already booked
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /uploads/sign:
    post:
      tags: [uploads]
      summary: Presign a direct-to-storage upload (B-upload, B-kyc)
      description: >
        Provider-only. Returns a short-lived presigned **multipart POST** to
        object storage (Cloudflare R2). The object key is built server-side from
        the token, and the signed policy pins the key, content-type, and a size
        range — so bytes go client → storage directly (never through the API)
        and a caller can only write under its own prefix. **`purpose=gallery`**
        → public bucket, prefix `gallery/{providerId}`, returns `publicUrl`
        (saved via `PUT /providers/{id}/gallery`). **`purpose=kyc`** → a
        separate **private** bucket, prefix `kyc/{accountId}`, returns the `key`
        only (ID docs are never public) and additionally accepts `application/
        pdf`.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contentType, purpose]
              properties:
                contentType:
                  type: string
                  enum: [image/jpeg, image/png, image/webp, application/pdf]
                purpose: { type: string, enum: [gallery, kyc] }
      responses:
        '200':
          description: A presigned upload ticket
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UploadTicket' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /appointments:
    get:
      tags: [appointments]
      summary: List the caller's appointments (B-appt)
      description: >
        Role-scoped: a **user** token returns that user's own bookings; a
        **provider** token returns the bookings of the salon it manages
        (the account's linked `providerId`). A provider account not yet linked
        to a Provider gets 403.
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, confirmed, cancelled, completed, noShow]
      responses:
        '200':
          description: The caller's appointments (own, or the salon's for a provider)
          content:
            application/json:
              schema:
                type: object
                required: [items, page, pageSize, total]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Appointment' }
                  page: { type: integer }
                  pageSize: { type: integer }
                  total: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [appointments]
      summary: Book an appointment — created pending, server-priced (B-appt)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [providerId, serviceIds, appointmentDateTime]
              properties:
                providerId: { type: string }
                serviceIds:
                  type: array
                  items: { type: string }
                appointmentDateTime: { type: string, format: date-time }
                artistId: { type: string }
                notes: { type: string }
                depositScreenshotUrl: { type: string }
              description: >
                total/deposit/balance are NOT accepted from the client — the
                server computes them from the provider's prices + deposit policy.
      responses:
        '201':
          description: The created (pending) appointment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Appointment' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: >
            `slot_unavailable` — the requested time isn't a free slot
            (closed/past/break/already-booked/non-aligned).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /appointments/{id}:
    get:
      tags: [appointments]
      summary: One of the caller's appointments (B-appt)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200':
          description: The appointment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Appointment' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /appointments/{id}/cancel:
    post:
      tags: [appointments]
      summary: Cancel the caller's own appointment (B-life)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200':
          description: The cancelled appointment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Appointment' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Not in a cancellable state (already cancelled/completed)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /appointments/{id}/review:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    post:
      tags: [reviews]
      summary: Review a completed appointment (B-reviews)
      description: >
        Consumer-only. The appointment must be the caller's own and `completed`
        (→ 403 `forbidden`/`not_completed`). The server derives provider, artist,
        service, reviewer, and `verified` from it; only `rating`/`text`/
        `photoUrls` are taken from the body. One review per appointment (resubmit
        replaces). Recomputes the provider's + artist's rating.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rating]
              properties:
                rating: { type: integer, minimum: 1, maximum: 5 }
                text: { type: string, maxLength: 1000 }
                photoUrls:
                  type: array
                  maxItems: 6
                  items: { type: string, maxLength: 2048 }
      responses:
        '201':
          description: The stored review
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Review' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /appointments/{id}/reschedule:
    post:
      tags: [appointments]
      summary: Move an appointment to a new time (B-life; B-pro-resched)
      description: >
        Role-aware: a `user` reschedules their own booking; a `provider`
        reschedules one of its own salon's bookings (ownership by the account's
        linked providerId → 403 cross-salon/unlinked). Both re-validate the new
        slot (→ 409 slot_unavailable for past/closed/taken). Deposit + balance
        carry over unchanged.
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newDateTime]
              properties:
                newDateTime: { type: string, format: date-time }
      responses:
        '200':
          description: The rescheduled appointment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Appointment' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Not in a reschedulable state, or the new slot is taken
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /appointments/{id}/accept:
    post:
      tags: [appointments]
      summary: Salon confirms a pending booking (B-pro-life)
      description: >
        Provider-role token only. The account's providerId must match the
        appointment's providerId (→ 403 otherwise). pending → confirmed.
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200':
          description: The confirmed appointment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Appointment' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /appointments/{id}/reject:
    post:
      tags: [appointments]
      summary: Salon declines a pending booking → cancelled (B-pro-life)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200':
          description: The cancelled appointment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Appointment' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /appointments/{id}/complete:
    post:
      tags: [appointments]
      summary: Salon marks a confirmed booking done (B-pro-life)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200':
          description: The completed appointment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Appointment' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /appointments/{id}/no-show:
    post:
      tags: [appointments]
      summary: Salon marks the client a no-show (B-pro-life)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200':
          description: The no-show appointment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Appointment' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /availability:
    get:
      tags: [appointments]
      summary: Bookable start times for a provider on a date (B-slot)
      description: >
        Server-authoritative availability. Public (clients browse before signing
        in). Times are UTC (Côte d'Ivoire is UTC+0). Honours the provider's
        weekly schedule, blocked dates, breaks, a setup/cleanup buffer, the
        requested duration, and existing bookings.
      parameters:
        - { in: query, name: providerId, required: true, schema: { type: string } }
        - in: query
          name: date
          required: true
          schema: { type: string, format: date, example: '2026-06-25' }
        - in: query
          name: serviceIds
          description: Comma-separated; sums their durations if durationMinutes is absent.
          schema: { type: string }
        - { in: query, name: durationMinutes, schema: { type: integer } }
      responses:
        '200':
          description: The bookable starts (may be empty if closed/blocked/full)
          content:
            application/json:
              schema:
                type: object
                required: [providerId, date, slots]
                properties:
                  providerId: { type: string }
                  date: { type: string }
                  slots:
                    type: array
                    items: { type: string, format: date-time }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Short-lived HS256 access token (~15 min). Obtain via /auth/otp/verify;
        refresh via /auth/refresh (rotating opaque refresh token). Applied to
        protected routes (e.g. /me) as those slices land — see docs/BACKEND.md §3.1.

  responses:
    BadRequest:
      description: Invalid input
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Authenticated but not allowed (e.g. another user's resource)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: Not allowed in the resource's current state
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    Health:
      type: object
      required: [status, service, time]
      properties:
        status: { type: string, example: ok }
        service: { type: string, example: myweli-api }
        time: { type: string, format: date-time }

    Error:
      type: object
      required: [error]
      properties:
        error: { type: string, description: Stable machine code, e.g. otp_expired }
        message: { type: string, description: Optional human-readable detail }

    OtpRequest:
      type: object
      required: [phoneNumber]
      properties:
        phoneNumber:
          type: string
          description: E.164, defaulting to +225 (Côte d'Ivoire).
          example: '+2250707123456'

    OtpVerify:
      type: object
      required: [phoneNumber, code]
      properties:
        phoneNumber: { type: string, example: '+2250707123456' }
        code: { type: string, example: '123456' }

    TokenPair:
      type: object
      required: [accessToken, refreshToken, expiresAt]
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresAt:
          type: string
          format: date-time
          description: Access-token expiry; mirrors the app's Session.expiresAt.

    AuthSession:
      type: object
      required: [tokens, user]
      properties:
        tokens: { $ref: '#/components/schemas/TokenPair' }
        user: { $ref: '#/components/schemas/User' }

    User:
      type: object
      required: [id, phoneNumber]
      properties:
        id: { type: string }
        phoneNumber: { type: string }
        name: { type: string }
        email: { type: string }
        avatarUrl: { type: string }

    ProviderUser:
      type: object
      description: A provider (business) account. Mirrors ProviderUser.toJson().
      required: [id, phoneNumber, businessName, businessType, createdAt]
      properties:
        id: { type: string }
        phoneNumber: { type: string }
        name: { type: string, nullable: true }
        businessName: { type: string }
        businessType:
          type: string
          enum: [salon, barber, spa, nailSalon, massage, other]
        email: { type: string, nullable: true }
        address: { type: string, nullable: true }
        verificationStatus:
          type: string
          enum: [pending, verified, rejected]
        rejectionReason: { type: string, nullable: true }
        kycDocs:
          type: array
          description: KYC document references (empty until the KYC slice).
          items: { type: object }
        createdAt: { type: string, format: date-time }
        providerId: { type: string, nullable: true }

    Appointment:
      type: object
      description: A booking. Mirrors Appointment.toJson(). Created `pending`.
      required:
        [id, userId, providerId, serviceIds, appointmentDate, status, totalPrice, createdAt]
      properties:
        id: { type: string }
        userId: { type: string }
        providerId: { type: string }
        serviceIds:
          type: array
          items: { type: string }
        artistId: { type: string, nullable: true }
        appointmentDate: { type: string, format: date-time }
        status:
          type: string
          enum: [pending, confirmed, cancelled, completed, noShow]
        totalPrice: { type: number }
        depositAmount: { type: number }
        balanceDue: { type: number }
        cancellationWindowHours: { type: integer }
        clientName: { type: string, nullable: true }
        clientPhone: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        depositScreenshotUrl: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    DurationVariants:
      type: object
      description: Optional per-hair-length durations (minutes). Mirrors DurationVariants.
      properties:
        court: { type: integer }
        moyen: { type: integer }
        long: { type: integer }

    Service:
      type: object
      required: [id, name, description, price, durationMinutes, providerId, active]
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        price: { type: number, description: '"From" (minimum) price, FCFA.' }
        priceMax: { type: number, nullable: true, description: Optional upper bound. }
        durationMinutes: { type: integer }
        durationVariants: { $ref: '#/components/schemas/DurationVariants' }
        providerId: { type: string }
        artistIds:
          type: array
          items: { type: string }
        active:
          type: boolean
          description: >
            Bookable when true. A disabled service is hidden from booking and
            rejected server-side. Defaults to true on create.

    ServiceInput:
      type: object
      description: >
        Create/update payload. On create, name/price/durationMinutes are
        required; on PATCH every field is optional. `id`/`providerId` are
        server-set and ignored if sent.
      properties:
        name: { type: string }
        description: { type: string }
        price: { type: number }
        priceMax: { type: number, nullable: true }
        durationMinutes: { type: integer }
        durationVariants: { $ref: '#/components/schemas/DurationVariants' }
        artistIds:
          type: array
          items: { type: string }
        active: { type: boolean }

    Artist:
      type: object
      required: [id, name, providerId]
      properties:
        id: { type: string }
        name: { type: string }
        imageUrl: { type: string, nullable: true }
        providerId: { type: string }
        specialization: { type: string, nullable: true }
        rating: { type: number, nullable: true, description: From reviews (read-only). }
        reviewCount: { type: integer, nullable: true, description: Read-only. }
        workingHours:
          type: object
          description: '{ "<0..6>": [TimeSlot] } — per-staff weekly hours.'
          additionalProperties:
            type: array
            items: { $ref: '#/components/schemas/TimeSlot' }

    ArtistInput:
      type: object
      description: >
        Create/update payload. `name` required on create; PATCH optional.
        `id`/`providerId`/`rating`/`reviewCount` are server-owned and ignored.
      properties:
        name: { type: string }
        specialization: { type: string, nullable: true }
        imageUrl: { type: string, nullable: true }
        workingHours:
          type: object
          additionalProperties:
            type: array
            items: { $ref: '#/components/schemas/TimeSlot' }

    TimeSlot:
      type: object
      required: [startTime, endTime, isAvailable]
      properties:
        startTime:
          type: string
          format: date-time
          description: Only the time-of-day is significant (placeholder date).
        endTime: { type: string, format: date-time }
        isAvailable: { type: boolean }

    Availability:
      type: object
      required: [providerId, weeklySchedule, blockedDates, bufferMinutes]
      properties:
        providerId: { type: string }
        weeklySchedule:
          type: object
          description: 'Keys "0".."6" (Mon..Sun) → working windows.'
          additionalProperties:
            type: array
            items: { $ref: '#/components/schemas/TimeSlot' }
        breaks:
          type: object
          description: Same shape as weeklySchedule; within-day breaks.
          additionalProperties:
            type: array
            items: { $ref: '#/components/schemas/TimeSlot' }
        blockedDates:
          type: array
          items: { type: string, format: date-time }
        bufferMinutes:
          type: integer
          description: Setup/cleanup gap enforced around each booking.

    DashboardStats:
      type: object
      required:
        [todayAppointments, pendingRequests, todayRevenue, weekRevenue,
         monthRevenue, totalAppointments]
      properties:
        todayAppointments:
          type: integer
          description: Non-cancelled bookings today (UTC).
        pendingRequests: { type: integer, description: Bookings awaiting accept. }
        todayRevenue:
          type: number
          description: Σ totalPrice of confirmed+completed bookings today (FCFA).
        weekRevenue: { type: number, description: Same, Monday-based week. }
        monthRevenue: { type: number, description: Same, calendar month. }
        totalAppointments: { type: integer, description: All-time, any status. }

    UploadTicket:
      type: object
      required: [method, uploadUrl, fields, key, maxBytes, expiresInSeconds]
      properties:
        method: { type: string, enum: [POST] }
        uploadUrl: { type: string, description: Multipart POST target (storage). }
        fields:
          type: object
          additionalProperties: { type: string }
          description: Signed form fields; send these then the file (last).
        key: { type: string, description: The object key (used to reference the upload). }
        publicUrl:
          type: string
          description: CDN URL — only for `gallery` (omitted for private `kyc`).
        maxBytes: { type: integer }
        expiresInSeconds: { type: integer }

    KycStatus:
      type: object
      required: [status, documents]
      properties:
        status:
          type: string
          enum: [pending, verified, rejected]
          description: Server-owned; only the (future) admin flips it.
        documents:
          type: array
          items: { $ref: '#/components/schemas/KycDocument' }
        rejectionReason: { type: string, nullable: true }

    KycDocument:
      type: object
      required: [type, key]
      properties:
        type:
          type: string
          enum: [idCard, selfie, businessRegistration, addressProof]
        fileName: { type: string }
        key: { type: string, description: Private storage object key. }
        submittedAt: { type: string, format: date-time }

    KycDocumentInput:
      type: object
      required: [type, key]
      properties:
        type:
          type: string
          enum: [idCard, selfie, businessRegistration, addressProof]
        fileName: { type: string }
        key:
          type: string
          description: From `/uploads/sign?purpose=kyc`; under the caller's prefix.

    Review:
      type: object
      required: [id, providerId, userId, userName, rating, createdAt]
      properties:
        id: { type: string }
        appointmentId: { type: string, description: The reviewed visit. }
        providerId: { type: string }
        userId: { type: string }
        userName: { type: string }
        rating: { type: integer, minimum: 1, maximum: 5 }
        text: { type: string }
        verified: { type: boolean, description: Always true (post-completion). }
        artistId: { type: string, nullable: true }
        artistName: { type: string, nullable: true }
        serviceName: { type: string, description: Service(s) of the visit. }
        photoUrls: { type: array, items: { type: string } }
        createdAt: { type: string, format: date-time }

    DepositPolicy:
      type: object
      required: [depositRequired, depositPercentage, cancellationWindowHours]
      properties:
        depositRequired: { type: boolean }
        depositPercentage:
          type: number
          minimum: 0
          maximum: 1
          description: Fraction of the total (0.30 = 30%); > 0 when required.
        cancellationWindowHours: { type: integer, minimum: 0, maximum: 720 }
        mobileMoneyOperator:
          type: string
          nullable: true
          enum: [wave, orangeMoney, mtnMoMo, moov]
        mobileMoneyNumber:
          type: string
          nullable: true
          description: E.164. Required (with operator) when depositRequired.

    Gallery:
      type: object
      required: [imageUrls]
      properties:
        imageUrls:
          type: array
          maxItems: 20
          items: { type: string, maxLength: 2048 }
          description: Ordered list of hosted photo URLs (bytes live in storage).

    EarningsData:
      type: object
      required: [totalEarnings, transactions]
      properties:
        totalEarnings:
          type: number
          description: Σ totalPrice of completed bookings in range (FCFA).
        transactions:
          type: array
          items: { $ref: '#/components/schemas/EarningsTransaction' }

    EarningsTransaction:
      type: object
      required: [id, appointmentId, amount, date, status]
      properties:
        id: { type: string }
        appointmentId: { type: string }
        amount: { type: number }
        date: { type: string, format: date-time }
        status: { type: string, description: '"completed".' }

    ProviderSummary:
      type: object
      description: Lightweight list item for /providers.
      required: [id, name, category, rating, reviewCount]
      properties:
        id: { type: string }
        name: { type: string }
        category: { type: string }
        commune: { type: string, nullable: true }
        rating: { type: number }
        reviewCount: { type: integer }
        logoUrl: { type: string, nullable: true }
        imageUrls:
          type: array
          items: { type: string }
        depositRequired: { type: boolean }

    Provider:
      type: object
      description: Full provider detail. Mirrors Provider.toJson() field-for-field.
      required: [id, name, description, address, imageUrls, rating, reviewCount, services, phoneNumber, category]
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        address: { type: string }
        city: { type: string, nullable: true }
        commune: { type: string, nullable: true }
        latitude: { type: number, nullable: true }
        longitude: { type: number, nullable: true }
        imageUrls:
          type: array
          items: { type: string }
        logoUrl: { type: string, nullable: true }
        rating: { type: number }
        reviewCount: { type: integer }
        services:
          type: array
          items: { $ref: '#/components/schemas/Service' }
        phoneNumber: { type: string }
        whatsapp: { type: string, nullable: true }
        category: { type: string }
        depositRequired: { type: boolean }
        depositPercentage: { type: number }
        depositMobileMoneyOperator:
          type: string
          nullable: true
          enum: [wave, orangeMoney, mtnMoMo, moov]
        depositMobileMoneyNumber: { type: string, nullable: true }
        cancellationWindowHours: { type: integer }
