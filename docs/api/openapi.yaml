  /providers/{id}/gallery:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    get:
      tags: [providers]
      summary: Read a salon's gallery photo URLs (B-gallery, provider-owned)
      description: >
        Provider-authenticated and ownership-scoped (→ 403). Image bytes are
        uploaded out of band to object storage; only URLs pass through the API.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: The salon's gallery
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Gallery' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    put:
      tags: [providers]
      summary: Replace a salon's gallery wholesale (B-gallery)
      description: >
        Validated: a list of non-empty URL strings, at most 20, each ≤ 2048
        chars. Server stores exactly what's sent.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Gallery' }
      responses:
        '200':
          description: The stored gallery
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Gallery' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /providers/{id}/before-after:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    get:
      tags: [providers]
      summary: Read a salon's before/after pairs (FR-DISC-006, provider-owned)
      description: >
        Provider-authenticated + ownership-scoped (→ 403). The public
        `GET /providers/{id}` also surfaces `beforeAfters`. Image bytes are
        uploaded out of band; only URLs pass through.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: The salon's before/after pairs
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BeforeAfterList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    put:
      tags: [providers]
      summary: Replace a salon's before/after pairs wholesale (FR-DISC-006)
      description: >
        Validated: ≤ 12 pairs; each `before`/`after` a non-empty URL ≤ 2048 chars
        (origin-allowlisted when public delivery is configured); optional
        `caption` ≤ 120 chars.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BeforeAfterList' }
      responses:
        '200':
          description: The stored pairs
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BeforeAfterList' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /providers/{id}/reviews:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    get:
      tags: [reviews]
      summary: A salon's reviews, newest first (B-reviews, public)
      description: >
        Public, paginated. `pageSize` is clamped (default 20, max 50). The
        provider's `GET /providers/{id}` also embeds the latest 10.
      parameters:
        - { in: query, name: page, schema: { type: integer } }
        - { in: query, name: pageSize, schema: { type: integer } }
      responses:
        '200':
          description: A page of reviews
          content:
            application/json:
              schema:
                type: object
                required: [items, page, pageSize, total]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Review' }
                  page: { type: integer }
                  pageSize: { type: integer }
                  total: { type: integer }

  /providers/{id}/publish:
    post:
      tags: [providers]
      summary: Take the salon live (pro-salon-lifecycle)
      description: >
        Owner-only (the token's account must own {id} — T50). Flips the salon
        from `draft` to `active` when the server-computed go-live gate passes
        (PRD FR-PRO-ONB-001): profile (description + address + commune), ≥3
        active services, ≥3 photos, at least one open weekday. Incomplete →
        409 `incomplete` with the missing checklist keys. Idempotent for an
        already-active salon. Drafts are invisible on every public surface
        (discovery, by-slug, sitemap) and refuse bookings (T51).
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200':
          description: The (now) active provider
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Provider' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: The go-live gate failed
          content:
            application/json:
              schema:
                type: object
                required: [error, missing]
                properties:
                  error: { type: string, enum: [incomplete] }
                  missing:
                    type: array
                    items:
                      type: string
                      enum: [profile, location, services, photos, availability, offer]

  /providers/{id}/deposit-policy:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    get:
      tags: [providers]
      summary: Read a salon's deposit policy (B-deposit, provider-owned)
      description: Provider-authenticated and ownership-scoped (→ 403).
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: The salon's deposit policy
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DepositPolicy' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    put:
      tags: [providers]
      summary: Replace a salon's deposit policy wholesale (B-deposit)
      description: >
        Server-authoritative (booking derives each deposit from this).
        **Enabling deposits requires a KYC-VERIFIED account** (T52) →
        403 `verification_required` otherwise.
        Validated: `depositPercentage` 0..1 (and > 0 when required);
        `cancellationWindowHours` 0..720; `mobileMoneyOperator` in the enum;
        `mobileMoneyNumber` E.164. **When `depositRequired` is true, the Mobile
        Money operator + number are required.**
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DepositPolicy' }
      responses:
        '200':
          description: The stored deposit policy
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DepositPolicy' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /providers/{id}/dashboard:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    get:
      tags: [providers]
      summary: Server-computed dashboard stats for a salon (B-dash)
      description: >
        Provider-authenticated and ownership-scoped (token account's
        `providerId` must equal `{id}` → else 403). Revenue counts
        `confirmed` + `completed`; `todayAppointments` excludes cancelled.
        Computed in UTC.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: The salon's dashboard stats
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DashboardStats' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /providers/{id}/earnings:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    get:
      tags: [providers]
      summary: The salon's realized earnings ledger (B-earn)
      description: >
        Provider-authenticated and ownership-scoped (→ 403). Counts only
        `completed` appointments (realized money — narrower than the
        dashboard's revenue). Optional inclusive UTC date range; absent = all
        time.
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: startDate, schema: { type: string, format: date-time } }
        - { in: query, name: endDate, schema: { type: string, format: date-time } }
      responses:
        '200':
          description: The salon's earnings
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EarningsData' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /providers/{id}/subscription:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    get:
      tags: [providers]
      summary: The salon's offer state (pricing pivot — R2a)
      description: >
        Owner-only (`subscription.manage`, threat T54). 404 while the salon
        is in the free setup state (no offer chosen). Status lifecycle:
        `trial` → (`paid`)* → `grace` (7 days) → `expired`; expiry leads to
        UNPUBLISH (draft, T51) — never a data lockout.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: The derived offer state
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SalonSubscription' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [providers]
      summary: Choose or switch the salon's offer (3 mois offerts)
      description: >
        Owner-only. The FIRST choice starts the salon's ONE 3-month trial;
        switches keep the clock; once `expired`, re-choosing → 409
        `trial_used` (payment is manual — « Nous contacter », admin-recorded).
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tier]
              properties:
                tier: { type: string, enum: [pro, business, reseau] }
      responses:
        '200':
          description: The new offer state
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SalonSubscription' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: Trial already used (`trial_used`)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /providers/{id}/appointments:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    post:
      tags: [providers]
      summary: Salon-entered (walk-in / phone) booking (B-manual)
      description: >
        A booking the salon enters itself for a client with no app account —
        walk-in, after-the-fact, or a future phone booking. Provider-only and
        ownership-scoped. Server-priced; created `confirmed` with no online
        deposit (`userId` = `"manual"`). No slot-engine validation (the salon
        owns its calendar); the exact-start unique index still guards
        double-booking (409). `sendSmsInvite` is accepted but a no-op until the
        notifications slice.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [serviceIds, appointmentDateTime]
              properties:
                serviceIds:
                  type: array
                  items: { type: string }
                appointmentDateTime: { type: string, format: date-time }
                artistId: { type: string }
                clientName: { type: string }
                clientPhone: { type: string, description: E.164 if provided. }
                notes: { type: string }
                sendSmsInvite: { type: boolean }
      responses:
        '201':
          description: The created (confirmed) appointment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Appointment' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Exact-start slot already booked
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /uploads/sign:
    post:
      tags: [uploads]
      summary: Presign a direct-to-storage upload (B-upload, B-kyc)
      parameters:
        - { $ref: '#/components/parameters/SalonSelector' }
      description: >
        Provider-only. Returns a short-lived presigned **multipart POST** to
        object storage (Cloudflare R2). The object key is built server-side from
        the token, and the signed policy pins the key, content-type, and a size
        range — so bytes go client → storage directly (never through the API)
        and a caller can only write under its own prefix. **`purpose=gallery`**
        → public bucket, prefix `gallery/{providerId}`, returns `publicUrl`
        (saved via `PUT /providers/{id}/gallery`). **`purpose=kyc`** → a
        separate **private** bucket, prefix `kyc/{accountId}`, returns the `key`
        only (ID docs are never public) and additionally accepts `application/
        pdf`. **`purpose=deposit`** → **consumer-only** (a `user` token), a
        **separate** private bucket (`R2_DEPOSIT_BUCKET`, kept apart from KYC),
        prefix `deposit/{userId}`, returns the `key` only (payment proof is never
        public; images only). **`purpose=review`** → **consumer-only**, the
        public bucket (review tiles render the photos), prefix
        `review/{userId}`, returns `publicUrl` (images only; review submit
        caps `photoUrls` at 6). Role is gated **per purpose**:
        `deposit`/`review` require `user`; `gallery`/`kyc` require `provider`.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contentType, purpose]
              properties:
                contentType:
                  type: string
                  enum: [image/jpeg, image/png, image/webp, application/pdf]
                purpose: { type: string, enum: [gallery, kyc, deposit, review] }
      responses:
        '200':
          description: A presigned upload ticket
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UploadTicket' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /providers/{id}/clients:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    get:
      tags: [clients]
      summary: The salon's client base (module clients C1)
      description: >
        Provider-authenticated + ownership-scoped (capability `clients.view` —
        owner-only until the access module). Paginated, sorted by last visit;
        `query` matches name substring or phone digits (≥2); `tag` filters.
        Every read is AUDITED (threat T46). Page 1 carries `availableTags`
        (presets VIP/Fidèle/À risque + the salon's custom tags).
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: query, schema: { type: string } }
        - { in: query, name: tag, schema: { type: string } }
        - { in: query, name: page, schema: { type: integer, default: 1 } }
        - { in: query, name: pageSize, schema: { type: integer, default: 20, maximum: 50 } }
      responses:
        '200':
          description: The salon's clients
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SalonClientList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [clients]
      summary: Add a client manually (phone REQUIRED — the dedupe/link key)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, phone]
              properties:
                name: { type: string }
                phone: { type: string, description: E.164 }
                note: { type: string, description: Optional first note (≤500). }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SalonClient' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: 'That phone already has a row: `client_exists` + `clientId`.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                  clientId: { type: string }

  /providers/{id}/clients/{clientId}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
      - { in: path, name: clientId, required: true, schema: { type: string } }
    get:
      tags: [clients]
      summary: The client card (stats + upcoming + notes; read audited)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: The card
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SalonClientCard' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [clients]
      summary: Update the tag set (≤10 tags, each ≤24 chars)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tags]
              properties:
                tags:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SalonClient' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /providers/{id}/clients/{clientId}/visits:
    parameters:
