          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SalonClientNote' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /providers/{id}/clients/{clientId}/notes/{noteId}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
      - { in: path, name: clientId, required: true, schema: { type: string } }
      - { in: path, name: noteId, required: true, schema: { type: string } }
    delete:
      tags: [clients]
      summary: Delete a note (author or owner)
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /providers/{id}/journal:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    get:
      tags: [journal]
      summary: The journal day view in ONE payload (module journal J1)
      description: >
        Provider-authenticated + ownership-scoped (threat T41). Hours/breaks
        for the weekday (null when closed/blocked), the artist columns, and
        the day's appointments (ALL statuses, ascending) enriched with
        salonClientId / clientNoShowCount / arrivedAt. OWN-SCOPE callers
        (Collaborateur, `journal.view.own` — T40, access R4a) receive their
        own artist's column and bookings only, and `clientPhone` is masked
        on any day other than today (the same-day contact rule). The `date`
        names a calendar day in the SALON's timezone (multi-pays MP1).
        Design: docs/design/journal-j1-grid.md.
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: date, required: true, schema: { type: string, format: date } }
      responses:
        '200':
          description: The day
          content:
            application/json:
              schema: { $ref: '#/components/schemas/JournalDay' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /appointments/{id}/arrive:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    post:
      tags: [journal]
      summary: « Client arrivé » (journal J2) — stamp arrivedAt
      description: >
        Provider-only + ownership. CONFIRMED bookings, on their calendar day
        (UTC) only; idempotent (repeat → 200 with the same state). Wrong
        state/day → 409 (`invalid_state` / `not_today`). Threat T43.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: The updated appointment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Appointment' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Not confirmed, or not its calendar day
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /appointments:
    get:
      tags: [appointments]
      summary: List the caller's appointments (B-appt)
      description: >
        Role-scoped: a **user** token returns that user's own bookings **plus
        provider-entered (manual) bookings made to the account's OTP-verified
        phone** (auto-sync, FR-APPT-008 — the match phone is resolved
        server-side, never from the request); a **provider** token returns the
        bookings of the salon it acts in (owner link or active membership).
        OWN-SCOPE members (Collaborateur, `journal.view.own` — T40, access
        R4a) get their own artist's bookings only, with `clientPhone` masked
        off-day. A provider account with no salon and no active membership
        gets 403. R6: a provider `?salonId=` selects among the caller's
        ACTIVE memberships (invalid → uniform 403, T55).
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, confirmed, cancelled, completed, noShow]
        - { $ref: '#/components/parameters/SalonSelector' }
      responses:
        '200':
          description: The caller's appointments (own, or the salon's for a provider)
          content:
            application/json:
              schema:
                type: object
                required: [items, page, pageSize, total]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Appointment' }
                  page: { type: integer }
                  pageSize: { type: integer }
                  total: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [appointments]
      summary: Book an appointment — created pending, server-priced (B-appt)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [providerId, serviceIds, appointmentDateTime]
              properties:
                providerId: { type: string }
                serviceIds:
                  type: array
                  items: { type: string }
                appointmentDateTime: { type: string, format: date-time }
                artistId: { type: string }
                notes: { type: string }
                depositScreenshotUrl: { type: string }
              description: >
                total/deposit/balance are NOT accepted from the client — the
                server computes them from the provider's prices + deposit policy.
      responses:
        '201':
          description: The created (pending) appointment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Appointment' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: >
            `slot_unavailable` — the requested time isn't a free slot
            (closed/past/break/already-booked/non-aligned).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /appointments/{id}:
    get:
      tags: [appointments]
      summary: One of the caller's appointments (B-appt)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200':
          description: The appointment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Appointment' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /appointments/{id}/cancel:
    post:
      tags: [appointments]
      summary: Cancel the caller's own appointment (B-life)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200':
          description: The cancelled appointment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Appointment' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Not in a cancellable state (already cancelled/completed)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /appointments/{id}/deposit:
    post:
      tags: [appointments]
      summary: Attach a deposit-payment screenshot (B-deposit)
      description: >
        Consumer-only, and only the caller's **own** booking while it is still
        `pending` (pay-later: book now, pay the salon directly via Mobile Money,
        attach proof afterward — booking can also include the key inline). The
        `screenshotKey` must be one the caller just uploaded via
        `POST /uploads/sign?purpose=deposit` (validated under the caller's own
        `deposit/{userId}/` prefix). Myweli holds no funds; the salon confirms
        receipt by **accepting** the booking. The screenshot is private — view it
        via `GET /appointments/{id}/deposit-screenshot`.
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [screenshotKey]
              properties:
                screenshotKey:
                  type: string
                  description: Key from `/uploads/sign?purpose=deposit`.
      responses:
        '200':
          description: The updated appointment (with the screenshot attached)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Appointment' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Not in a state that accepts a deposit (not `pending`)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /appointments/{id}/deposit-screenshot:
    get:
      tags: [appointments]
      summary: A signed view URL for the deposit screenshot (B-deposit)
      description: >
        Returns a short-lived **signed GET** URL for the booking's deposit
        screenshot. Restricted to the two parties to the transaction: the
        booking's **consumer** (`userId`) or its **salon** (the provider
        account's linked `providerId`) — anyone else gets 403. The bytes live in
        private storage and are never served through the API. 404 if no
        screenshot has been attached.
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200':
          description: A short-lived signed URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /appointments/{id}/review:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    post:
      tags: [reviews]
      summary: Review a completed appointment (B-reviews)
      description: >
        Consumer-only. The appointment must be the caller's own and `completed`
        (→ 403 `forbidden`/`not_completed`). The server derives provider, artist,
        service, reviewer, and `verified` from it; only `rating`/`text`/
        `photoUrls` are taken from the body. One review per appointment (resubmit
        replaces). Recomputes the provider's + artist's rating.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rating]
              properties:
                rating: { type: integer, minimum: 1, maximum: 5 }
                text: { type: string, maxLength: 1000 }
                photoUrls:
                  type: array
                  maxItems: 6
                  items: { type: string, maxLength: 2048 }
      responses:
        '201':
          description: The stored review
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Review' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /appointments/{id}/reschedule:
    post:
      tags: [appointments]
      summary: Move an appointment to a new time (B-life; B-pro-resched)
      description: >
        Role-aware: a `user` reschedules their own booking; a `provider`
        reschedules one of its acting salon's bookings (membership-resolved;
        the service cross-checks the appointment's salon → 403 cross-salon).
        R6: `?salonId=` selects the acting salon among ACTIVE memberships.
        Both re-validate the new slot (→ 409 slot_unavailable for
        past/closed/taken). Deposit + balance carry over unchanged.
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
        - { $ref: '#/components/parameters/SalonSelector' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newDateTime]
              properties:
                newDateTime: { type: string, format: date-time }
                artistId:
                  type: string
                  description: >
                    PROVIDER ONLY (journal J1 drag-across-columns): reassign
                    the booking's artist; must belong to the salon → else 400
                    `invalid_artist`.
      responses:
        '200':
          description: The rescheduled appointment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Appointment' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Not in a reschedulable state, or the new slot is taken
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /appointments/{id}/accept:
    post:
      tags: [appointments]
      summary: Salon confirms a pending booking (B-pro-life)
      description: >
        Provider-role token only. The account's providerId must match the
        appointment's providerId (→ 403 otherwise). pending → confirmed.
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200':
          description: The confirmed appointment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Appointment' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /appointments/{id}/reject:
    post:
      tags: [appointments]
      summary: Salon declines a pending booking → cancelled (B-pro-life)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200':
          description: The cancelled appointment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Appointment' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /appointments/{id}/complete:
    post:
      tags: [appointments]
      summary: Salon marks a confirmed booking done (B-pro-life)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200':
          description: The completed appointment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Appointment' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /appointments/{id}/no-show:
    post:
      tags: [appointments]
      summary: Salon marks the client a no-show (B-pro-life)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200':
          description: The no-show appointment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Appointment' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /availability:
    get:
      tags: [appointments]
      summary: Bookable start times for a provider on a date (B-slot)
      description: >
        Server-authoritative availability. Public (clients browse before signing
        in). Times are UTC (Côte d'Ivoire is UTC+0). Honours the provider's
        weekly schedule, blocked dates, breaks, a setup/cleanup buffer, the
        requested duration, and existing bookings.
      parameters:
        - { in: query, name: providerId, required: true, schema: { type: string } }
        - in: query
          name: date
          required: true
          description: A calendar day in the SALON's timezone (multi-pays MP1).
          schema: { type: string, format: date, example: '2026-06-25' }
        - in: query
          name: serviceIds
          description: Comma-separated; sums their durations if durationMinutes is absent.
          schema: { type: string }
        - { in: query, name: durationMinutes, schema: { type: integer } }
        - in: query
          name: artistId
          description: >
            Per-artist capacity (booking-capacity-web-hub.md): slots free for
            THIS artist (capable + within their hours + no assigned overlap,
            with the unassigned pool still leaving a chair). Absent =
            « Sans préférence » — free while ANY capable chair remains; when
            every chair is taken the slot is not bookable at all. Unknown
            artist → 400 invalid_artist.
          schema: { type: string }
      responses:
        '200':
          description: The bookable starts (may be empty if closed/blocked/full)
          content:
            application/json:
              schema:
                type: object
                required: [providerId, date, slots]
                properties:
                  providerId: { type: string }
                  date: { type: string }
                  slots:
                    type: array
                    items: { type: string, format: date-time }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---- Admin / ops console (internal; role=admin) — B-admin Slice 1 ----------
  # Every /admin/* path except auth requires an `admin` access token (deny by
  # default); every mutation is recorded in the append-only audit log.
  /admin/auth/login:
    post:
      tags: [admin]
      summary: Staff login (B-admin)
      description: >
        Email + password → admin token pair. Rate-limited; repeated failures
        lock the account out (429). Admins are seeded, never self-signup.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Admin token pair
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429':
          description: Locked out after too many failed attempts
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /admin/auth/refresh:
    post:
      tags: [admin]
      summary: Rotate an admin refresh token (B-admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: A fresh admin token pair
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /admin/kyc:
    get:
      tags: [admin]
      summary: KYC approval queue (B-admin, FR-WEB-AD-001)
      description: Providers awaiting verification (`verification_status=pending`), paginated.
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: page, schema: { type: integer, minimum: 1 } }
        - { in: query, name: pageSize, schema: { type: integer, minimum: 1, maximum: 100 } }
      responses:
        '200':
          description: Paginated pending accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        accountId: { type: string }
                        businessName: { type: string }
                        businessType: { type: string }
                        submittedAt: { type: string, format: date-time }
                        docCount: { type: integer }
                  page: { type: integer }
                  pageSize: { type: integer }
                  total: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/kyc/{accountId}:
    get:
      tags: [admin]
      summary: KYC submission detail with signed doc URLs (B-admin)
      description: >
        Full provider account plus `docs[]`, each with a short-lived **signed-GET**
        `viewUrl` into the private KYC bucket (bytes never proxied through the API).
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: accountId, required: true, schema: { type: string } }
      responses:
        '200':
          description: Account + docs (with viewUrl)
          content:
            application/json:
              schema: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/kyc/{accountId}/approve:
    post:
      tags: [admin]
      summary: Approve verification (B-admin) — audited
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: accountId, required: true, schema: { type: string } }
      responses:
        '200':
          description: The updated provider account (verified)
          content:
            application/json:
              schema: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/kyc/{accountId}/reject:
    post:
      tags: [admin]
      summary: Reject verification with a reason (B-admin) — audited
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: accountId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string }
      responses:
        '200':
          description: The updated provider account (rejected + reason)
          content:
            application/json:
              schema: { type: object }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/audit:
    get:
      tags: [admin]
      summary: Append-only admin audit log (B-admin, FR-WEB-AD-008)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: page, schema: { type: integer, minimum: 1 } }
        - { in: query, name: pageSize, schema: { type: integer, minimum: 1, maximum: 100 } }
        - { in: query, name: actor, schema: { type: string } }
        - { in: query, name: action, schema: { type: string } }
      responses:
        '200':
          description: Paginated audit entries (newest first)
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { type: object } }
                  page: { type: integer }
                  pageSize: { type: integer }
                  total: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /reviews/{id}/report:
    post:
      tags: [reviews]
      summary: Report a review (B-admin A2, FR-REV-005)
      description: >
        Consumer-only. Flags a review for moderation; it stays visible until an
        admin acts. Idempotent per (review, reporter). `reason` is optional.
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string, maxLength: 500 }
      responses:
        '200': { description: Reported (idempotent) }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/reviews/reports:
    get:
      tags: [admin]
      summary: Moderation queue — reviews with open reports (B-admin A2)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: page, schema: { type: integer, minimum: 1 } }
        - { in: query, name: pageSize, schema: { type: integer, minimum: 1, maximum: 100 } }
      responses:
        '200':
          description: Reported reviews (one row each), newest report first
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        reviewId: { type: string }
                        providerId: { type: string }
                        userName: { type: string }
                        rating: { type: integer }
                        text: { type: string }
                        moderationStatus: { type: string }
                        reportCount: { type: integer }
                        lastReason: { type: string }
                        lastReportedAt: { type: string, format: date-time }
                  page: { type: integer }
                  pageSize: { type: integer }
                  total: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

