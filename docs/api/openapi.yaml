openapi: 3.1.0

info:
  title: Myweli API
  version: 0.1.0
  description: >
    The single REST API behind every Myweli client (Flutter mobile app, the
    public Next.js web, the admin console). It replaces the app's mock
    `*ServiceInterface` implementations one slice at a time (ROADMAP Phase 3).


    This file is the **contract source of truth**. Schemas mirror the Dart DTOs
    in `mobile/lib/models/` exactly, so swapping a mock for `Api<X>Service` is a
    field-for-field match. Endpoints are added as each slice ships:
      - B0  health                      (implemented)
      - B1  GET /providers, /providers/{id}   (contract locked; impl next)
      - B2  POST /auth/otp/*, /auth/refresh   (contract locked; impl next)
    Real Mobile Money, WhatsApp/SMS and FCM are out of V1 scope here.

servers:
  - url: http://localhost:8080
    description: Local dart_frog dev server

tags:
  - name: system
  - name: auth
  - name: providers
  - name: admin
  - name: messaging

paths:
  /health:
    get:
      tags: [system]
      summary: Liveness probe
      responses:
        '200':
          description: Service is up
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }

  /auth/otp/request:
    post:
      tags: [auth]
      summary: Request a one-time code for a phone number (B2 — dormant at launch)
      description: >
        Dispatches the code over SMS (Twilio) — best-effort. Dev builds also
        return it inline (`devCode`); production never does. Dormant at launch:
        404 `auth_method_disabled` unless `AUTH_METHODS` includes `phone`
        (design: docs/design/auth-social-email.md).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OtpRequest' }
      responses:
        '202':
          description: Code dispatched (dev builds return it inline)
          content:
            application/json:
              schema:
                type: object
                properties:
                  expiresInSeconds: { type: integer, example: 300 }
                  devCode:
                    type: string
                    description: Present only in dev; never in production.
        '429': { $ref: '#/components/responses/RateLimited' }

  /webhooks/messaging/status:
    post:
      tags: [messaging]
      summary: BSP delivery-status callback (Twilio) — advances the outbox row
      description: >
        Form-encoded `MessageSid` + `MessageStatus` from the BSP. Guarded by a
        shared `?secret=` when `MESSAGING_WEBHOOK_SECRET` is set (deny-by-default).
        Always 200 for known/unknown ids (idempotent).
      parameters:
        - { in: query, name: secret, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                MessageSid: { type: string }
                MessageStatus: { type: string }
      responses:
        '200': { description: Acknowledged }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /internal/cron/reminders:
    post:
      tags: [messaging]
      summary: Reminder cron tick — dispatch due 24h/2h reminders (internal)
      description: >
        Hit by an external scheduler (~every 15 min). Guarded by `CRON_SECRET`
        (`X-Cron-Secret` header or `?secret=`): 404 when unset (off), 403 on
        mismatch. Idempotent per tick.
      parameters:
        - { in: query, name: secret, schema: { type: string } }
        - { in: header, name: X-Cron-Secret, schema: { type: string } }
      responses:
        '200':
          description: Counts dispatched this tick
          content:
            application/json:
              schema:
                type: object
                properties:
                  reminder24h: { type: integer }
                  reminder2h: { type: integer }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /auth/otp/verify:
    post:
      tags: [auth]
      summary: Verify a code and issue tokens (B2)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OtpVerify' }
      responses:
        '200':
          description: Verified
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthSession' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /auth/google:
    post:
      tags: [auth]
      summary: Sign in with a Google ID token (auth overhaul)
      description: >
        Verifies the RS256 ID token against Google's JWKS (signature, iss, aud
        allowlist, exp, verified email) before touching any account, then
        finds/creates/links the user (link only on a **verified** email) and
        issues our own session. Design: docs/design/auth-social-email.md.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [idToken]
              properties:
                idToken: { type: string, description: Google ID token (JWT) }
      responses:
        '200':
          description: Signed in
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthSession' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /auth/apple:
    post:
      tags: [auth]
      summary: Sign in with Apple (auth overhaul)
      description: >
        Verifies the identity token against Apple's JWKS (signature, iss, aud,
        exp, nonce). `fullName` is Apple's first-authorization display-name
        hint (not part of the signed token; never used for linking).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identityToken]
              properties:
                identityToken: { type: string, description: Apple identity token (JWT) }
                nonce:
                  type: string
                  description: The raw nonce used for the sign-in request (replay defence).
                fullName: { type: string, description: First-auth display-name hint. }
      responses:
        '200':
          description: Signed in
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthSession' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /auth/email/otp/request:
    post:
      tags: [auth]
      summary: Request a one-time code by email (auth overhaul)
      description: >
        Sends a 6-digit code to the address (Resend). The response is identical
        whether or not the address maps to an account (no enumeration). Dev
        builds also return the code inline (`devCode`); production never does.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '202':
          description: Code dispatched (dev builds return it inline)
          content:
            application/json:
              schema:
                type: object
                properties:
                  expiresInSeconds: { type: integer, example: 300 }
                  devCode:
                    type: string
                    description: Present only in dev; never in production.
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /auth/email/otp/verify:
    post:
      tags: [auth]
      summary: Verify an emailed code and issue tokens (auth overhaul)
      description: >
        Proving inbox ownership verifies the email; the user is found or
        created by (lowercased) address.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email: { type: string, format: email }
                code: { type: string, example: '123456' }
      responses:
        '200':
          description: Verified
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthSession' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /auth/refresh:
    post:
      tags: [auth]
      summary: Exchange a refresh token for a new token pair (B2)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: Rotated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me:
    get:
      tags: [auth]
      summary: Read the signed-in user's own profile (B2)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: The signed-in user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [auth]
      summary: Update the signed-in user's own profile (B2)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string, description: "Empty string clears it. Changing it resets emailVerified." }
                avatarUrl: { type: string }
                phone:
                  type: string
                  description: >
                    Contact phone (E.164). Empty string clears it. Setting a
                    new value resets phoneVerified (verified later via SMS).
      responses:
        '200':
          description: The updated user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [auth]
      summary: Delete the signed-in user's own account (B2)
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/provider:
    get:
      tags: [auth]
      summary: The signed-in provider's account + acting salon + membership (web M7 · access R4a)
      description: >-
        Provider-only; the salon DEFAULTS server-side from the account
        (owner) or the active membership (team member). R6: `?salonId=`
        selects among the caller's ACTIVE memberships — invalid → uniform
        403 `forbidden` (T55). The response carries the caller's MEMBERSHIP
        (role + server-computed capabilities + the staff artist link) so
        clients shape by role. Non-provider or unlinked account → 403
        `forbidden`; a REVOKED member on the NO-PARAM path (memberships
        exist, none active) → 403 `not_a_member` — the revoked-mid-session
        signal (a per-salon denial never signs out the whole session).
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/SalonSelector' }
      responses:
        '200':
          description: The provider account + its salon + the caller's membership
          content:
            application/json:
              schema:
                type: object
                required: [account, provider, membership]
                properties:
                  account: { $ref: '#/components/schemas/ProviderUser' }
                  provider: { $ref: '#/components/schemas/Provider' }
                  membership: { $ref: '#/components/schemas/Membership' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: >-
            Not a provider / unlinked (`forbidden`), or a revoked member
            (`not_a_member`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }

    delete:
      tags: [auth]
      summary: Delete the provider ACCOUNT (audit 11.5 — AUTH-004 for pros)
      description: >
        Self-scoped and irreversible. Future pending/confirmed bookings in
        ANY owned salon block the deletion (409 `future_bookings` — settle
        every agenda first; R6). EVERY salon the account owns is unpublished
        (`status → draft`, hidden from every public surface by T51) while
        bookings/reviews/CRM keep resolving; member-only salons are
        untouched; the
        account row, its KYC documents (rows AND the private storage
        objects), OTP state and every refresh token are erased — all
        sessions die. Threat T53.
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Account deleted; salon unpublished. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: Future pending/confirmed bookings exist (`future_bookings`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /me/provider/members:
    get:
      tags: [team]
      summary: The salon's team — members + pending invitations (access R2b)
      description: >
        Owner-only (`members.manage`, threat T36); the salon DEFAULTS from
        the caller's membership — R6: `?salonId=` selects among ACTIVE
        memberships (invalid → uniform 403, T55). Owner first; invited rows
        carry `expiresAt`/`resendsLeft` and an `expired` flag.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/SalonSelector' }
      responses:
        '200':
          description: The member list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/TeamMember' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [team]
      summary: Invite a team member by email (access R2b)
      description: >
        Owner-only. Role ∈ manager/reception/staff (`invalid_role`); staff
        requires a salon-owned `artistId` (`artist_required` /
        `artist_not_found`). 409 `member_exists` (already active or
        pending), `offer_required` (no live offer — R2a pricing pivot),
        `seat_limit` (offer seats full). 429 `invite_rate_limited`
        (per-salon daily cap, threat T37). Sends the branded invitation
        email (7-day validity). R6: `?salonId=` selects the salon.
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/SalonSelector' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email: { type: string, format: email }
                role: { type: string, enum: [manager, reception, staff] }
                artistId: { type: string, description: Required when role=staff. }
      responses:
        '201':
          description: Invitation created (the pending member row)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TeamMember' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /me/provider/members/{memberId}:
    patch:
      tags: [team]
      summary: Change a member's role (access R2b)
      description: >
        Owner-only. The OWNER row is immutable → 403 `owner_protected`
        (threat T36). role=staff requires a salon-owned `artistId`.
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: memberId, in: path, required: true, schema: { type: string } }
        - { $ref: '#/components/parameters/SalonSelector' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string, enum: [manager, reception, staff] }
                artistId: { type: string }
      responses:
        '200':
          description: Updated member
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TeamMember' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /me/provider/members/{memberId}/revoke:
    post:
      tags: [team]
      summary: Revoke a member's access (access R2b)
      description: >
        Owner-only, idempotent. Effective on the member's very next request —
        capability resolution is per-request, never cached (threat T38).
        The owner row → 403 `owner_protected`.
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: memberId, in: path, required: true, schema: { type: string } }
        - { $ref: '#/components/parameters/SalonSelector' }
      responses:
        '200':
          description: Revoked member row
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TeamMember' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /me/provider/members/{memberId}/resend:
    post:
      tags: [team]
      summary: Re-send a pending invitation (access R2b)
      description: >
        Owner-only; resets the 7-day window. Budget of 3 resends per
        invitation → 429 `invite_rate_limited` when exhausted (threat T37).
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: memberId, in: path, required: true, schema: { type: string } }
        - { $ref: '#/components/parameters/SalonSelector' }
      responses:
        '200':
          description: Refreshed invitation row
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TeamMember' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /me/provider/invitations:
    get:
      tags: [team]
      summary: The signed-in pro identity's pending invitations (access R2b)
      description: >
        Keyed on the ACCOUNT's verified email — never a client-supplied one
        (threat T37). Any provider session may call it (bare member accounts
        included).
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Pending invitation cards
          content:
            application/json:
              schema:
                type: object
                required: [invitations]
                properties:
                  invitations:
                    type: array
                    items: { $ref: '#/components/schemas/TeamInvitation' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /me/provider/invitations/{invitationId}/accept:
    post:
      tags: [team]
      summary: Accept an invitation under the current session (access R2b)
      description: >
        The session is the identity proof; the invitation must target the
        account's own verified email (403). Expired → 409
        `invitation_expired`.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: invitationId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Activated member row
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TeamMember' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /me/provider/invitations/{invitationId}/decline:
    post:
      tags: [team]
      summary: Decline an invitation under the current session (access R2b)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: invitationId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Declined (the invitation row is deleted)
          content:
            application/json:
              schema:
                type: object
                required: [declined]
                properties:
                  declined: { type: boolean }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /me/kyc:
    get:
      tags: [kyc]
      summary: The signed-in provider's KYC status (B-kyc)
      description: Provider-only; self-scoped to the token's account.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: KYC status + submitted documents
          content:
            application/json:
              schema: { $ref: '#/components/schemas/KycStatus' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [kyc]
      summary: Submit KYC documents (B-kyc)
      description: >
        Provider-only. Each document's `key` is one the caller uploaded via
        `POST /uploads/sign?purpose=kyc` (must be under the caller's
        `kyc/{accountId}/` prefix). Sets `verificationStatus` to `pending` and
        clears any prior rejection. Approve/reject is a future admin slice.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [documents]
              properties:
                documents:
                  type: array
                  items: { $ref: '#/components/schemas/KycDocumentInput' }
      responses:
        '200':
          description: The updated KYC status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/KycStatus' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /me/devices:
    post:
      tags: [messaging]
      summary: Register an FCM device token (push) — self-scoped
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, platform]
              properties:
                token: { type: string }
                platform: { type: string, enum: [android, ios, web] }
      responses:
        '200': { description: Registered }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    delete:
      tags: [messaging]
      summary: Unregister an FCM device token (logout) — self-scoped
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        '200': { description: Unregistered }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/notifications:
    get:
      tags: [messaging]
      summary: In-app notification feed (FR-NOTIF-002) — self-scoped, newest first
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: The caller's notifications (≤50)
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: '#/components/schemas/Notification' } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/notifications/read-all:
    post:
      tags: [messaging]
      summary: Mark all the caller's notifications read
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/notifications/{id}/read:
    post:
      tags: [messaging]
      summary: Mark one of the caller's notifications read (self-scoped)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200': { description: OK }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /me/notification-preferences:
    get:
      tags: [messaging]
      summary: The caller's notification preferences (FR-NOTIF-004) — self-scoped
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: The caller's preferences (all-true defaults if never set)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationPreferences' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    put:
      tags: [messaging]
      summary: Update notification preferences (partial; each field a bool)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reminders: { type: boolean }
                marketing: { type: boolean }
                push: { type: boolean }
      responses:
        '200':
          description: The merged preferences
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationPreferences' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/salons:
    get:
      tags: [team]
      summary: "« Mes salons » — every ACTIVE membership + the add-salon gate (access R6)"
      description: >
        Provider-only. Every salon the caller holds an ACTIVE membership in
        (owned first, then salonName), each with the caller's role there and
        the salon's status/badge — the switcher payload. `canAddSalon` is
        SERVER-computed (≥1 owned salon on a live Réseau offer, under the
        salon cap — clients never derive rights). A bare account gets
        `{items: [], canAddSalon: false}`.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: The caller's salons + the add gate
          content:
            application/json:
              schema:
                type: object
                required: [items, canAddSalon]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/SalonMembership' }
                  canAddSalon: { type: boolean }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [team]
      summary: "« Ajouter un salon » — an additional draft salon (access R6, Réseau-gated)"
      description: >
        Provider-only (threat T55). Requires ≥1 OWNED salon with a live
        (trial/paid/grace) Réseau offer → else 403 `reseau_required`; capped
        at 20 owned salons → 409 `salon_limit`. Creates a DRAFT salon (own
        setup state — its own offer, its own trial, its own publish gate; no
        subscription row) plus the owner membership row; the account's
        default salon link is untouched. The « Vérifié » badge is inherited
        when the account's KYC is approved (T52). `phoneNumber` defaults to
        the account's.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [businessName, businessType]
              properties:
                businessName: { type: string }
                businessType:
                  type: string
                  enum: [salon, barber, spa, nailSalon, massage, other]
                phoneNumber: { type: string }
                address: { type: string }
                areaId:
                  type: string
                  description: >-
                    Optional locality pick (an `Area.id` from GET /localities)
                    — market facts derive from it (400 `invalid_area` when
                    unknown).
      responses:
        '201':
          description: The new draft salon's directory entry
          content:
            application/json:
              schema:
                type: object
                required: [salon]
                properties:
                  salon: { $ref: '#/components/schemas/SalonMembership' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: >-
            Not a provider (`forbidden`), or no live Réseau offer on any
            owned salon (`reseau_required`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: The owned-salon cap is reached (`salon_limit`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /me/subscription:
    get:
      tags: [provider]
      summary: LEGACY plan status (compat shape; the real model is per-salon)
      description: >
        Provider-role, self-scoped; derived from the acting salon's offer
        (fallback: the account-age derivation). R6: `?salonId=` selects
        among the caller's ACTIVE memberships (invalid → 403 `forbidden`).
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/SalonSelector' }
      responses:
        '200':
          description: The caller's subscription status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Subscription' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /me/favorites:
    get:
      tags: [favorites]
      summary: The signed-in consumer's saved provider ids (B-favorites)
      description: >
        Consumer-only; scoped to the token's `sub` (no user id is accepted, so
        a caller only ever sees their own favorites).
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: The user's favorite provider ids
          content:
            application/json:
              schema:
                type: object
                required: [providerIds]
                properties:
                  providerIds:
                    type: array
                    items: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /me/favorites/{providerId}:
    parameters:
      - { in: path, name: providerId, required: true, schema: { type: string } }
    post:
      tags: [favorites]
      summary: Save a provider as a favorite (idempotent)
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Added (or already a favorite) }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [favorites]
      summary: Remove a favorite (idempotent)
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Removed (or was not a favorite) }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /auth/provider/otp/request:
    post:
      tags: [auth]
      summary: Request a login code for an existing provider (B-prov)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OtpRequest' }
      responses:
        '202':
          description: Code dispatched (dev builds return it inline)
          content:
            application/json:
              schema:
                type: object
                properties:
                  expiresInSeconds: { type: integer }
                  devCode: { type: string, description: dev only }
        '429': { $ref: '#/components/responses/RateLimited' }

  /auth/provider/register:
    post:
      tags: [auth]
      summary: Register a salon — identity proof INLINE (auth overhaul P4)
      description: >
        One submit registers AND signs in. Provide EXACTLY ONE identity proof:
        `idToken` (Google) · `identityToken` (+`nonce`) (Apple) · `email`+`code`
        (email OTP via /auth/provider/email/otp/request). The contact
        `phoneNumber` is REQUIRED. Returns a live ProviderSession (201).
        Also provisions the account's linked DRAFT salon (publicly invisible
        until `POST /providers/{id}/publish` — pro-salon-lifecycle; legacy
        salon-less accounts self-heal on `GET /me/provider`).
        Design: docs/design/pro-auth-social.md.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [businessName, businessType, phoneNumber]
              properties:
                businessName: { type: string }
                businessType:
                  type: string
                  enum: [salon, barber, spa, nailSalon, massage, other]
                phoneNumber: { type: string, description: E.164 — required salon contact. }
                address: { type: string }
                areaId:
                  type: string
                  description: >-
                    Optional locality pick (an `Area.id` from GET /localities)
                    — the salon's commune/city/timezone/currency DERIVE from
                    it server-side (multi-pays MP1; unknown → 400
                    `invalid_area`).
                providerId: { type: string }
                idToken: { type: string, description: Google ID token (identity proof). }
                identityToken: { type: string, description: Apple identity token. }
                nonce: { type: string }
                email: { type: string, format: email }
                code: { type: string, description: Email OTP (identity proof with `email`). }
      responses:
        '201':
          description: Registered + signed in (flat ProviderSession)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProviderSession' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: An account already exists for this identity (provider_exists)

  /auth/provider/google:
    post:
      tags: [auth]
      summary: Salon sign-in with a Google ID token (LOGIN-ONLY, auth overhaul P4)
      description: >
        Verified against Google's JWKS. A salon is never auto-created — no
        account → 404 `provider_not_found` (the client offers registration),
        UNLESS the verified email holds pending team invitations (module
        `access` R2b) → 202 with the invitation cards.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [idToken]
              properties:
                idToken: { type: string }
      responses:
        '200':
          description: Signed in (flat ProviderSession)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProviderSession' }
        '202':
          description: >-
            No account, but the email has pending team invitations — the
            client shows the « Invitations » step instead of registration.
          content:
            application/json:
              schema:
                type: object
                required: [invitations]
                properties:
                  invitations:
                    type: array
                    items: { $ref: '#/components/schemas/TeamInvitation' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /auth/provider/apple:
    post:
      tags: [auth]
      summary: Salon Sign in with Apple (LOGIN-ONLY seam, auth overhaul P4)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identityToken]
              properties:
                identityToken: { type: string }
                nonce: { type: string }
      responses:
        '200':
          description: Signed in (flat ProviderSession)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProviderSession' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /auth/provider/email/otp/request:
    post:
      tags: [auth]
      summary: Request a salon email OTP (login AND registration use it)
      description: >
        No enumeration — identical 202 whether or not the address maps to a
        salon. Dev builds echo `devCode`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '202':
          description: Code dispatched
          content:
            application/json:
              schema:
                type: object
                properties:
                  expiresInSeconds: { type: integer }
                  devCode: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /auth/provider/email/otp/verify:
    post:
      tags: [auth]
      summary: Verify a salon email OTP (LOGIN-ONLY)
      description: >
        A correct code with no salon returns 404 `provider_not_found` WITHOUT
        consuming the code (the register call reuses it) — UNLESS the email
        holds pending team invitations (module `access` R2b) → 202 with the
        invitation cards (code also left unconsumed for the accept call).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email: { type: string, format: email }
                code: { type: string }
      responses:
        '200':
          description: Signed in (flat ProviderSession)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProviderSession' }
        '202':
          description: >-
            No account, but the email has pending team invitations — the
            client shows the « Invitations » step instead of registration.
          content:
            application/json:
              schema:
                type: object
                required: [invitations]
                properties:
                  invitations:
                    type: array
                    items: { $ref: '#/components/schemas/TeamInvitation' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /auth/provider/invitations/accept:
    post:
      tags: [auth]
      summary: Accept a team invitation, creating the member account if needed (access R2b)
      description: >
        Unauthenticated but identity-PROVEN — `{invitationId, idToken}`
        (Google, verified email) or `{invitationId, email, code}` (the email
        OTP from the login attempt, still unconsumed). An existing account is
        signed in and joined (200); otherwise a bare member account (no
        salon) is created and joined (201). The invitation must target the
        proven email (403) and be unexpired (409 `invitation_expired`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invitationId]
              properties:
                invitationId: { type: string }
                idToken: { type: string, description: Google ID token path. }
                email: { type: string, format: email, description: Email-OTP path. }
                code: { type: string, description: Email-OTP path. }
      responses:
        '200':
          description: Accepted under the existing account (flat ProviderSession)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProviderSession' }
        '201':
          description: Member account created + invitation accepted (flat ProviderSession)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProviderSession' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Invitation expired (`invitation_expired`)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/provider/invitations/decline:
    post:
      tags: [auth]
      summary: Decline a team invitation without creating anything (access R2b)
      description: >
        Same identity proof as the accept (`idToken` or `email`+`code`; the
        OTP is validated WITHOUT being consumed). The invitation must target
        the proven email (403).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invitationId]
              properties:
                invitationId: { type: string }
                idToken: { type: string }
                email: { type: string, format: email }
                code: { type: string }
      responses:
        '200':
          description: Declined (the invitation row is deleted)
          content:
            application/json:
              schema:
                type: object
                required: [declined]
                properties:
                  declined: { type: boolean }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /auth/provider/otp/verify:
    post:
      tags: [auth]
      summary: Verify a provider code; returns the account + a token pair (B-prov)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OtpVerify' }
      responses:
        '200':
          description: Verified
          content:
            application/json:
              schema:
                type: object
                required: [provider, accessToken, refreshToken, expiresAt]
                properties:
                  provider: { $ref: '#/components/schemas/ProviderUser' }
                  accessToken:
                    type: string
                    description: Signed JWT, role `provider`.
                  refreshToken:
                    type: string
                    description: >
                      Rotating opaque refresh token (hashed at rest); exchange
                      at POST /auth/provider/refresh.
                  expiresAt:
                    type: string
                    format: date-time
                    description: Access-token expiry.
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /auth/provider/refresh:
    post:
      tags: [auth]
      summary: Exchange a provider refresh token for a new token pair (B-prov)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: Rotated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /localities:
    get:
      tags: [system]
      summary: The public locality reference tree (multi-pays MP1)
      description: >-
        Countries → Mobile-Money operator catalog + cities → areas
        (communes/quartiers). Read-only seeded reference data — the source of
        every locality picker, discovery filter, SEO landing family and the
        salon's derived timezone/currency (threat T56: no write endpoint
        exists; clients build payment deep links ONLY from the closed
        `deepLinkKind` vocabulary). Cacheable (`Cache-Control: public,
        max-age=3600`).
      responses:
        '200':
          description: The tree
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LocalityTree' }

  /providers:
    get:
      tags: [providers]
      summary: List/search providers (B1)
      parameters:
        - { in: query, name: q, schema: { type: string }, description: Free-text search }
        - { in: query, name: commune, schema: { type: string } }
        - { in: query, name: category, schema: { type: string } }
        - { in: query, name: sort, schema: { type: string, enum: [relevance, rating, price], default: relevance }, description: "FR-DISC-007 sort: relevance (featured+rating), rating desc, or min-service-price asc." }
        - { in: query, name: availableToday, schema: { type: boolean }, description: "FR-DISC-007: keep only salons with ≥1 free slot today." }
        - { in: query, name: page, schema: { type: integer, default: 1, minimum: 1 } }
        - { in: query, name: pageSize, schema: { type: integer, default: 20, minimum: 1, maximum: 50 } }
      responses:
        '200':
          description: A page of providers
          content:
            application/json:
              schema:
                type: object
                required: [items, page, pageSize, total]
                properties:
                  items:
                    type: array
                    description: >
                      Full Provider objects for now (the app model has no
                      separate summary type). ProviderSummary is reserved for a
                      later lightweight list payload.
                    items: { $ref: '#/components/schemas/Provider' }
                  page: { type: integer }
                  pageSize: { type: integer }
                  total: { type: integer }

  /providers/{id}:
    get:
      tags: [providers]
      summary: Provider detail (B1)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200':
          description: The provider
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Provider' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [providers]
      summary: Update the salon's editable public profile (web M7.3e, owner-only)
      description: >-
        Provider role + ownership (account.providerId == {id} → else 403). Only
        the editable public fields below are accepted; protected fields (slug,
        rating, reviewCount, status, services, artists, availability, imageUrls)
        have their own endpoints and are ignored. `phoneNumber`/`whatsapp` E.164.
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
                address: { type: string }
                city: { type: string, nullable: true }
                commune: { type: string, nullable: true }
                phoneNumber: { type: string, description: E.164. }
                whatsapp: { type: string, nullable: true, description: E.164. }
                latitude:
                  type: number
                  description: Map pin (pro-salon-lifecycle L1); PAIRED with longitude, −90..90.
                longitude: { type: number, description: Paired with latitude, −180..180. }
                category:
                  type: string
                  enum: [salon, barber, spa, nails, massage]
      responses:
        '200':
          description: The updated provider
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Provider' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /providers/by-slug/{slug}:
    get:
      tags: [providers]
      summary: Provider detail by URL slug (public; backs the web page myweli.ci/<slug>)
      description: >
        Public read mirroring `GET /providers/{id}`, resolved by the provider's
        URL slug. Embeds recent reviews. FR-WEB-PP-001.
      parameters:
        - { in: path, name: slug, required: true, schema: { type: string } }
      responses:
        '200':
          description: The provider
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Provider' }
        '404': { $ref: '#/components/responses/NotFound' }

  /sitemap/providers:
    get:
      tags: [providers]
      summary: Listable provider slugs for the web sitemap (public)
      responses:
        '200':
          description: Slugs of non-suspended providers
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        slug: { type: string }

  /providers/{id}/services:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    get:
      tags: [providers]
      summary: List a salon's services (B-cat, provider-owned)
      description: >
        Provider-authenticated and ownership-scoped: the token's account must
        manage `{id}` (else 403).
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: The salon's services
          content:
            application/json:
              schema:
                type: object
                required: [items, page, pageSize, total]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Service' }
                  page: { type: integer }
                  pageSize: { type: integer }
                  total: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [providers]
      summary: Create a service (B-cat)
      description: Server sets `id`, `providerId`, and `active` (default true).
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ServiceInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Service' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /providers/{id}/services/{serviceId}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
      - { in: path, name: serviceId, required: true, schema: { type: string } }
    patch:
      tags: [providers]
      summary: Update a service — incl. `active` to enable/disable (B-cat)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ServiceInput' }
      responses:
        '200':
          description: The updated service
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Service' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [providers]
      summary: Delete a service (B-cat)
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /providers/{id}/artists:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    get:
      tags: [providers]
      summary: List a salon's staff (B-artists, provider-owned)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: The salon's artists
          content:
            application/json:
              schema:
                type: object
                required: [items, page, pageSize, total]
                properties:
                  items: { type: array, items: { $ref: '#/components/schemas/Artist' } }
                  page: { type: integer }
                  pageSize: { type: integer }
                  total: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [providers]
      summary: Add a staff member (B-artists)
      description: >
        Server sets `id`/`providerId`; `rating`/`reviewCount` come from reviews
        (read-only). `workingHours` is `{ "<0..6>": [TimeSlot] }`.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ArtistInput' }
      responses:
        '201':
          description: The created artist
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Artist' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /providers/{id}/artists/{artistId}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
      - { in: path, name: artistId, required: true, schema: { type: string } }
    patch:
      tags: [providers]
      summary: Update a staff member (B-artists)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ArtistInput' }
      responses:
        '200':
          description: The updated artist
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Artist' }
