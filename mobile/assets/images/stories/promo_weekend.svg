    <text x="30" y="140" font-family="Helvetica, Arial, sans-serif" font-size="36" font-weight="800" fill="#FFFFFF">Jusqu’à dimanche</text>
    <text x="30" y="196" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#D7D7D9">Réservez directement dans l’app</text>
    <rect x="30" y="232" width="220" height="56" rx="28" fill="url(#accent)"/>
