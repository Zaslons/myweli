<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1280" viewBox="0 0 720 1280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F0F10"/>
      <stop offset="1" stop-color="#2A2A2D"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF4D8D"/>
      <stop offset="1" stop-color="#FFB4CF"/>
    </linearGradient>
  </defs>
  <rect width="720" height="1280" fill="url(#bg)"/>
  <circle cx="610" cy="220" r="260" fill="url(#accent)" opacity="0.22"/>
  <circle cx="120" cy="1030" r="320" fill="url(#accent)" opacity="0.18"/>
  <rect x="70" y="160" width="580" height="960" rx="44" fill="#FFFFFF" opacity="0.06"/>

  <text x="360" y="360" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="44" font-weight="800" fill="#FFFFFF">Promo Week‑End</text>
  <text x="360" y="420" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#D7D7D9">-15% sur une sélection de salons</text>

  <g transform="translate(110 560)">
