name: myweli
description: Myweli - Beauty and wellness booking app for Côte d'Ivoire
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Navigation
  go_router: ^13.0.0

  # Maps & Location
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  geolocator: ^14.0.2

  # Image caching (direct dep; used by TimedCachedImage)
  flutter_cache_manager: ^3.4.1

  # HTTP Client
  dio: ^5.9.2
  http: ^1.2.0

  # Local Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Auth overhaul: native Google Sign-In (+ Apple seam, flag-gated) and the
  # SHA-256 for Apple's nonce. Design: docs/design/app-auth-social.md.
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1
  crypto: ^3.0.3

  # UI Components
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  # Brand loader animations (Lottie): in-app loading (mark_loader) + app-open (loader_v2).
  lottie: ^3.1.2
  # Pull-to-refresh with the brand mark_loader instead of the Material spinner.
  custom_refresh_indicator: ^4.0.1
  flutter_slidable: ^3.1.1
  intl: ^0.20.2
  # International phone entry: country-code picker (default Côte d'Ivoire) + E.164.
  intl_phone_field: ^3.2.0

  # Pro gallery uploads: pick from camera/gallery + compress before upload.
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  # KYC: pick identity documents (images or PDF) for private upload.
  file_picker: ^11.0.2

  # Calendar & Date Picker
  table_calendar: ^3.0.9
  flutter_datetime_picker_plus: ^2.1.0

  # Utilities
  uuid: ^4.2.1
  equatable: ^2.0.5

  # Icons
  cupertino_icons: ^1.0.6
  url_launcher: ^6.3.2
  add_2_calendar: ^3.0.1
  timezone: ^0.11.1

  # Push notifications (FR-NOTIF-001 — docs/design/push-notifications-app.md).
  # The real FCM adapter behind the push seam; Firebase is initialized ONLY in
  # backend mode (demo runs and `flutter test` never touch it).
  firebase_core: ^4.1.1
  firebase_messaging: ^16.0.2
  # Android foreground display: FCM does not draw `notification` payloads while
  # the app is foregrounded, so we render them ourselves in the `myweli_default`
  # channel. iOS uses setForegroundNotificationPresentationOptions instead.
  # v22: v19/v20 pin `timezone ^0.10`, which collides with the ^0.11 the
  # salon-time seam runs on (core/utils/salon_time.dart).
  flutter_local_notifications: ^22.0.1
  # The re-enable path when notifications are denied at the OS level.
  app_settings: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  # Generates the native launch screen (app-open) from a logo + brand color.
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/providers/
    - assets/images/stories/
    - assets/brand/
    - assets/lottie/open/
    - assets/lottie/loader/

  # Fonts will use system defaults (SF Pro on iOS, Roboto on Android)
  # To add custom Inter font later, download from https://fonts.google.com/specimen/Inter

# Native launch screen (app-open) — client brand: white mark on black.
# Regenerate: dart run flutter_native_splash:create
# Design: docs/design/branding-integration.md.
flutter_native_splash:
  color: "#FAFAFA"
  image: assets/splash/splash_logo.png
  fullscreen: true
  # Native app splash only — the admin web keeps its own branded template (P2).
  web: false
  android_12:
    image: assets/splash/splash_logo_android12.png
    color: "#FAFAFA"
    icon_background_color: "#FAFAFA"

