# Static analysis configuration for Myweli.
# Base = recommended Flutter lints; we layer on a curated set of high-signal
# rules that catch real correctness / safety / resource bugs (per the dev
# guardrails: security & performance are first-order). Style-only rules that
# would create large mechanical churn are intentionally left out for now.

include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "build/**"

linter:
  rules:
    # ── Correctness & safety (catch real bugs) ───────────────────
    - avoid_print # no stray logging in production code
    - unawaited_futures # surface fire-and-forget async (lost errors)
    - avoid_dynamic_calls # dynamic dispatch hides type errors
    - avoid_empty_else
    - unnecessary_await_in_return
    - unnecessary_statements

    # ── Resource management (leaks → perf/memory) ────────────────
    - cancel_subscriptions
    - close_sinks

    # ── Consistency / readability ────────────────────────────────
    - prefer_single_quotes
    - directives_ordering
    - sort_child_properties_last
    - sized_box_for_whitespace
