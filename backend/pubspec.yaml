name: myweli_backend
description: Myweli REST API (dart_frog). Replaces the app's mock *ServiceInterface implementations.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.10.0

dependencies:
  bcrypt: ^1.1.3
  crypto: ^3.0.3
  dart_frog: ^1.1.0
  dart_jsonwebtoken: ^2.14.0
  http: ^1.2.0
  # RSA key construction from JWKS (n/e) for Google/Apple ID-token verification.
  pointycastle: ^3.9.1
  postgres: ^3.5.12

dev_dependencies:
  lints: ^4.0.0
  mocktail: ^1.0.4
  test: ^1.25.0
