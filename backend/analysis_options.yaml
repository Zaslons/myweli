include: package:lints/recommended.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # dart_frog dynamic routes are idiomatically named `[id].dart`, which the
    # default file_names lint rejects. Bracket filenames are framework convention.
    file_names: ignore

linter:
  rules:
    - directives_ordering
    - prefer_const_constructors
    - prefer_const_declarations
    - prefer_final_locals
    - require_trailing_commas
    - unawaited_futures
